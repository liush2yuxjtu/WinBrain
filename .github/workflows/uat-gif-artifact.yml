name: UAT GIF Artifact

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  record-uat-gif:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      AUTH_SECRET: winbrain-uat-gif-secret-000000000000
      AUTH_USER_EMAIL: recording@example.com
      AUTH_USER_NAME: UAT Recording User
      AUTH_USER_ROLE: admin
      AUTH_URL: http://127.0.0.1:3000
      NEXTAUTH_URL: http://127.0.0.1:3000
      RECORDING_PASSWORD: winbrain-recording-password

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            apps/business-skill-studio/package-lock.json

      - name: Install dependencies
        run: |
          npm ci
          npm --prefix apps/business-skill-studio ci
          npx playwright install --with-deps chromium

      - name: Configure deterministic authentication
        working-directory: apps/business-skill-studio
        run: |
          password_hash="$(node -e 'const bcrypt = require("bcryptjs"); process.stdout.write(bcrypt.hashSync(process.env.RECORDING_PASSWORD, 10));')"
          echo "AUTH_USER_PASSWORD_HASH=$password_hash" >> "$GITHUB_ENV"

      - name: Start application
        run: |
          npm --prefix apps/business-skill-studio run dev -- --hostname 127.0.0.1 --port 3000 > /tmp/winbrain-uat-server.log 2>&1 &
          echo $! > /tmp/winbrain-uat-server.pid
          for attempt in $(seq 1 90); do
            if curl -fsS http://127.0.0.1:3000 >/dev/null; then exit 0; fi
            sleep 2
          done
          cat /tmp/winbrain-uat-server.log
          exit 1

      - name: Record browser UAT smoke flow
        run: |
          mkdir -p uat-media/videos uat-media/screenshots
          cat > /tmp/record-winbrain.mjs <<'NODE'
          import { chromium } from 'playwright';
          import fs from 'node:fs';
          const browser = await chromium.launch({ headless: true });
          const context = await browser.newContext({
            viewport: { width: 1440, height: 900 },
            recordVideo: { dir: 'uat-media/videos', size: { width: 1440, height: 900 } }
          });
          const page = await context.newPage();
          await page.goto('http://127.0.0.1:3000', { waitUntil: 'domcontentloaded', timeout: 120000 });
          const email = page.locator('input[name="email"]');
          if (await email.isVisible().catch(() => false)) {
            await email.fill(process.env.AUTH_USER_EMAIL);
            await page.locator('input[name="password"]').fill(process.env.RECORDING_PASSWORD);
            const login = page.getByRole('button', { name: /登录|sign in|login/i });
            if (await login.isVisible().catch(() => false)) {
              await login.click();
              await page.waitForTimeout(5000);
            }
          }
          await page.screenshot({ path: 'uat-media/screenshots/winbrain-home.png', fullPage: true });
          await page.mouse.wheel(0, 700);
          await page.waitForTimeout(2500);
          await page.mouse.wheel(0, -700);
          await page.waitForTimeout(2500);
          await context.close();
          await browser.close();
          fs.writeFileSync('uat-media/summary.txt', `Recorded ${new Date().toISOString()}\nURL: http://127.0.0.1:3000\n`);
          NODE
          node /tmp/record-winbrain.mjs

      - name: Convert video to GIF
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          video="$(find uat-media/videos -type f -name '*.webm' | sort | head -n 1)"
          test -n "$video"
          ffmpeg -y -i "$video" -t 20 -vf "fps=8,scale=960:-1:flags=lanczos,split[s0][s1];[s0]palettegen=max_colors=128[p];[s1][p]paletteuse=dither=bayer:bayer_scale=4" uat-media/winbrain-uat.gif
          test -s uat-media/winbrain-uat.gif

      - name: Upload UAT video and GIF
        uses: actions/upload-artifact@v4
        with:
          name: winbrain-uat-video-and-gif
          path: uat-media/
          if-no-files-found: error
          retention-days: 30
