name: Repair PR 34 fixer

on:
  push:
    branches:
      - feat/saas-ai-workbench

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v5
        with:
          ref: ${{ github.ref_name }}

      - name: Repair fixer workflow
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path

          path = Path('.github/workflows/pr-34-review-fixes.yml')
          text = path.read_text()

          old = """              '''import { useEffect, useState, type ReactNode } from 'react' ''',
              '''import Link from 'next/link'\\nimport { useEffect, useState, type ReactNode } from 'react' '''"""
          new = """              \"\"\"import { useEffect, useState, type ReactNode } from 'react'\"\"\",
              \"\"\"import Link from 'next/link'\\nimport { useEffect, useState, type ReactNode } from 'react'\"\"\""""
          if text.count(old) != 1:
              raise SystemExit('Could not find the malformed import replacement block')
          text = text.replace(old, new, 1)

          old_install = '        run: npm ci'
          new_install = '        run: npm install --no-package-lock'
          if text.count(old_install) != 1:
              raise SystemExit('Could not find npm ci step')
          path.write_text(text.replace(old_install, new_install, 1))
          PY

      - name: Commit repair
        shell: bash
        run: |
          rm .github/workflows/repair-pr-34-fixer.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/pr-34-review-fixes.yml .github/workflows/repair-pr-34-fixer.yml
          git commit -m "chore: repair PR review fixer"
          git push origin HEAD:${{ github.ref_name }}
