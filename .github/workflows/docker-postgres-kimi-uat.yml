name: Docker PostgreSQL + Kimi UAT

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number that receives the inline UAT evidence
        required: true
        type: string
      head_ref:
        description: Same-repository pull request branch name to test and update
        required: true
        type: string
      uat_tester:
        description: Real person executing or accepting this UAT
        required: true
        type: string

concurrency:
  group: docker-postgres-kimi-uat-${{ inputs.pr_number }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  actions: read

jobs:
  uat:
    name: Docker PostgreSQL、临时 Auth 与真实 Kimi UAT
    environment: uat
    runs-on: ubuntu-latest
    timeout-minutes: 50
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: winbrain_uat
          POSTGRES_USER: winbrain
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U winbrain -d winbrain_uat"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://winbrain@127.0.0.1:5432/winbrain_uat?schema=public
      SKILL_STORE_DRIVER: database
      KIMI_API_KEY_PRIMARY: ${{ secrets.KIMI_API_KEY_PRIMARY }}
      KIMI_API_KEY_FALLBACK: ${{ secrets.KIMI_API_KEY_FALLBACK }}
      KIMI_BASE_URL: https://api.kimi.com/coding/
      KIMI_THINKING_TOKENS: '32768'
      AGENT_SDK_ATTEMPT_TIMEOUT_MS: '600000'
      FRONTEND_API_RESPONSE_TIMEOUT_MS: '1250000'
      CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC: '1'
      FRONTEND_URL: http://127.0.0.1:3000
      FRONTEND_RECORD_SCENARIO: business-skill-studio
      PLAYWRIGHT_CHANNEL: chrome
      PR_NUMBER: ${{ inputs.pr_number }}
      HEAD_REF: ${{ inputs.head_ref }}
      UAT_TESTER: ${{ inputs.uat_tester }}

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.head_ref }}
          fetch-depth: 0

      - name: Load trusted PR evidence renderer
        id: trusted_renderer
        shell: bash
        run: |
          set -euo pipefail
          git fetch --no-tags --depth=1 origin main
          renderer="$RUNNER_TEMP/update-pr-evidence.mjs"
          git show origin/main:scripts/update-pr-evidence.mjs > "$renderer"
          echo "path=$renderer" >> "$GITHUB_OUTPUT"

      - name: Verify protected Kimi configuration
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "$KIMI_API_KEY_PRIMARY" ]; then
            echo "::error::Add a rotated key as the protected uat environment secret KIMI_API_KEY_PRIMARY."
            exit 1
          fi
          if [ -n "$KIMI_API_KEY_FALLBACK" ] && [ "$KIMI_API_KEY_PRIMARY" = "$KIMI_API_KEY_FALLBACK" ]; then
            echo "::error::The primary and fallback Kimi secrets must be different."
            exit 1
          fi
          test "$KIMI_BASE_URL" = "https://api.kimi.com/coding/"
          echo "Kimi endpoint verified; credential values remain masked."

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        shell: bash
        run: |
          npm ci
          npm --prefix apps/business-skill-studio ci --legacy-peer-deps

      - name: Generate ephemeral UAT Auth and encryption values
        working-directory: apps/business-skill-studio
        shell: bash
        run: |
          set -euo pipefail
          auth_secret="$(openssl rand -hex 32)"
          recording_password="$(openssl rand -hex 20)"
          encryption_key="$(openssl rand -base64 32 | tr -d '\n')"
          recording_email="uat-${GITHUB_RUN_ID}@example.invalid"
          password_hash="$(RECORDING_PASSWORD="$recording_password" node -e 'const bcrypt = require("bcryptjs"); process.stdout.write(bcrypt.hashSync(process.env.RECORDING_PASSWORD, 10));')"
          echo "::add-mask::$auth_secret"
          echo "::add-mask::$recording_password"
          echo "::add-mask::$encryption_key"
          {
            echo "AUTH_SECRET=$auth_secret"
            echo "AUTH_USER_EMAIL=$recording_email"
            echo "AUTH_USER_NAME=WinBrain UAT User"
            echo "AUTH_USER_ROLE=admin"
            echo "AUTH_USER_PASSWORD_HASH=$password_hash"
            echo "AUTH_URL=http://127.0.0.1:3000"
            echo "NEXTAUTH_URL=http://127.0.0.1:3000"
            echo "FRONTEND_RECORD_EMAIL=$recording_email"
            echo "FRONTEND_RECORD_PASSWORD=$recording_password"
            echo "DATA_SOURCE_ENCRYPTION_KEY=$encryption_key"
          } >> "$GITHUB_ENV"

      - name: Install Chrome
        run: npx playwright install --with-deps chrome

      - name: Apply Docker PostgreSQL migrations
        working-directory: apps/business-skill-studio
        run: npm run db:migrate:deploy

      - name: Build Business Skill Studio
        working-directory: apps/business-skill-studio
        run: npm run build

      - name: Start authenticated application
        shell: bash
        run: |
          set -euo pipefail
          cd apps/business-skill-studio
          nohup npm run start -- --hostname 127.0.0.1 --port 3000 > ../../frontend-server.log 2>&1 &
          for attempt in $(seq 1 60); do
            if curl --fail --silent http://127.0.0.1:3000/login >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          cat ../../frontend-server.log
          exit 1

      - name: Record real Kimi feature flow
        id: feature
        run: npm run record:frontend

      - name: Record authenticated PostgreSQL UAT and verify readback
        id: postgres_uat
        run: node tools/verify-skill-database.mjs

      - name: Write concrete UAT record
        if: ${{ always() }}
        shell: bash
        env:
          FEATURE_RESULT: ${{ steps.feature.outcome }}
          DATABASE_RESULT: ${{ steps.postgres_uat.outcome }}
        run: |
          set -euo pipefail
          mkdir -p artifacts/frontend-recording
          conclusion="不通过"
          if [ "$FEATURE_RESULT" = "success" ] && [ "$DATABASE_RESULT" = "success" ]; then
            conclusion="通过"
          fi
          cat > artifacts/frontend-recording/uat-record.md <<EOF
          # WinBrain Docker PostgreSQL + Kimi UAT

          - 验收人：${UAT_TESTER}
          - 用户/业务角色：Business Skill Studio 管理员
          - 验收场景：使用临时账号登录，调用真实 Kimi Code，生成 Skill，并保存到 Docker PostgreSQL
          - 验收事项：Auth 登录、真实模型响应、Skill 草稿生成、数据库写入、数据库直接回读一致性
          - 前置条件：受保护 UAT 环境、postgres:17-alpine、Kimi Coding endpoint
          - 操作步骤：登录 → 发送业务问题 → 生成 Skill 草稿 → 保存 Skill → 从 PostgreSQL 回读核对
          - 预期结果：模型路径为 Claude Agent SDK，Skill 保存成功且数据库内容与 UI 返回一致
          - 实际结果：功能流程=${FEATURE_RESULT}；数据库 UAT=${DATABASE_RESULT}
          - 验收结论：${conclusion}
          - LLM endpoint：https://api.kimi.com/coding/
          - 已验证提交：${GITHUB_SHA}
          EOF
          cp frontend-server.log artifacts/frontend-recording/frontend-server.log || true

      - name: Convert feature and UAT recordings to separate GIFs
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/frontend-recording/uat
          feature_video="$(find artifacts/frontend-recording/video -type f \( -name '*.webm' -o -name '*.mp4' -o -name '*.mov' \) 2>/dev/null | sort | head -n 1 || true)"
          uat_video="$(find artifacts/frontend-recording/uat-video -type f \( -name '*.webm' -o -name '*.mp4' -o -name '*.mov' \) 2>/dev/null | sort | head -n 1 || true)"
          test -n "$feature_video"
          test -n "$uat_video"
          ffmpeg -y -i "$feature_video" -t 15 \
            -vf "fps=6,scale=720:-1:flags=lanczos,split[s0][s1];[s0]palettegen=max_colors=96[p];[s1][p]paletteuse=dither=bayer:bayer_scale=5" \
            artifacts/frontend-recording/recording-preview.gif
          ffmpeg -y -i "$uat_video" -t 20 \
            -vf "fps=6,scale=720:-1:flags=lanczos,split[s0][s1];[s0]palettegen=max_colors=96[p];[s1][p]paletteuse=dither=bayer:bayer_scale=5" \
            artifacts/frontend-recording/uat/video-preview.gif

      - name: Upload UAT evidence backup
        id: upload
        if: ${{ always() && !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: docker-postgresql-kimi-uat-pr-${{ inputs.pr_number }}
          path: artifacts/frontend-recording
          if-no-files-found: error
          retention-days: 14

      - name: Publish UAT evidence to PR branch
        id: publish
        if: ${{ success() }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin "${HEAD_REF}:refs/remotes/origin/${HEAD_REF}"
          git reset --hard "origin/${HEAD_REF}"
          dest="pr-evidence/pr-${PR_NUMBER}/uat-real-stack/latest"
          rm -rf "$dest"
          mkdir -p "$dest"
          cp -R artifacts/frontend-recording/. "$dest/"
          find "$dest" -type f | sort > "$dest/manifest.txt"
          git add -f "$dest"
          if ! git diff --cached --quiet; then
            git commit -m "chore: publish PR ${PR_NUMBER} Docker PostgreSQL Kimi UAT evidence [skip ci]"
            git push origin HEAD:"${HEAD_REF}"
          fi
          echo "media_path=$dest" >> "$GITHUB_OUTPUT"
          echo "media_ref=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Inline UAT evidence in pull request
        if: ${{ success() }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          ARTIFACT_URL: ${{ steps.upload.outputs.artifact-url }}
          TEST_OUTCOME: ${{ steps.postgres_uat.outcome }}
          GITHUB_SHA: ${{ github.sha }}
          EVIDENCE_TITLE: Docker PostgreSQL + Auth + Kimi 真实 UAT 证据
          EVIDENCE_MARKER: docker-postgres-kimi-uat
          EVIDENCE_MEDIA_PATH: ${{ steps.publish.outputs.media_path }}
          EVIDENCE_MEDIA_REF: ${{ steps.publish.outputs.media_ref }}
        run: node "${{ steps.trusted_renderer.outputs.path }}"
