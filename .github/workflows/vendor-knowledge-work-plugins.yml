name: Vendor Knowledge Work Plugins

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/vendor-knowledge-work-plugins.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  vendor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout target repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Clone upstream knowledge-work-plugins
        run: |
          rm -rf /tmp/knowledge-work-plugins
          git clone --depth 1 https://github.com/anthropics/knowledge-work-plugins.git /tmp/knowledge-work-plugins

      - name: Copy upstream plugin contents into .agents
        run: |
          set -euo pipefail

          mkdir -p .agents/plugins/knowledge-work-plugins/upstream
          mkdir -p .agents/skills/knowledge-work-plugins/upstream

          rsync -a --delete \
            --exclude='.git/' \
            /tmp/knowledge-work-plugins/ \
            .agents/plugins/knowledge-work-plugins/upstream/

          # Mirror every upstream skills/ directory into project-level .agents/skills,
          # preserving nested plugin paths such as partner-built/zoom-plugin/skills.
          rm -rf .agents/skills/knowledge-work-plugins/upstream
          mkdir -p .agents/skills/knowledge-work-plugins/upstream
          find /tmp/knowledge-work-plugins \
            -path /tmp/knowledge-work-plugins/.git -prune -o \
            -type d -name skills -print | while read -r skills_dir; do
            plugin_dir="$(dirname "$skills_dir")"
            rel_plugin_dir="${plugin_dir#/tmp/knowledge-work-plugins/}"
            mkdir -p ".agents/skills/knowledge-work-plugins/upstream/$rel_plugin_dir/skills"
            rsync -a --delete "$skills_dir/" ".agents/skills/knowledge-work-plugins/upstream/$rel_plugin_dir/skills/"
          done

          upstream_commit="$(git -C /tmp/knowledge-work-plugins rev-parse --short HEAD)"
          cat > .agents/plugins/knowledge-work-plugins/VENDORED_FROM.md <<EOF
          # Vendored Knowledge Work Plugins

          Source repository: https://github.com/anthropics/knowledge-work-plugins

          Vendored from upstream commit: \`$upstream_commit\`

          The full upstream repository is copied under:

          \`\`\`text
          .agents/plugins/knowledge-work-plugins/upstream/
          \`\`\`

          Plugin skill directories are also mirrored under:

          \`\`\`text
          .agents/skills/knowledge-work-plugins/upstream/
          \`\`\`

          Nested plugin skill directories (for example \`partner-built/*/skills\`) preserve their upstream relative paths.
          EOF

      - name: Commit vendored plugin contents
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .agents/plugins/knowledge-work-plugins .agents/skills/knowledge-work-plugins
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Vendor anthropics knowledge work plugins into .agents"
            git push
          fi
