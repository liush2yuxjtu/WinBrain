name: Frontend Playwright Recording

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      frontend_url:
        description: Optional URL to record instead of auto-detecting a local dev server
        required: false
        type: string
      frontend_start_command:
        description: Optional command to start the frontend before recording
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write
  actions: read

jobs:
  record:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install root npm dependencies
        run: npm install

      - name: Install Business Skill Studio dependencies
        working-directory: apps/business-skill-studio
        run: |
          cp package.json package.recording.original.json
          node - <<'NODE'
          const fs = require('node:fs')
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'))
          if (pkg.dependencies) {
            delete pkg.dependencies['@anthropic-ai/claude-agent-sdk']
          }
          fs.writeFileSync('package.json', `${JSON.stringify(pkg, null, 2)}\n`)
          NODE
          npm install --no-package-lock --legacy-peer-deps
          mkdir -p node_modules/@anthropic-ai/claude-agent-sdk
          cat > node_modules/@anthropic-ai/claude-agent-sdk/package.json <<'EOF'
          {"name":"@anthropic-ai/claude-agent-sdk","version":"0.0.0-recording-stub","type":"module","main":"index.js"}
          EOF
          cat > node_modules/@anthropic-ai/claude-agent-sdk/index.js <<'EOF'
          export async function* query() {
            yield { text: 'Recording stub response from Claude Agent SDK.' }
          }
          EOF
          mv package.recording.original.json package.json

      - name: Install Chrome for Playwright
        run: |
          npx playwright install --with-deps chrome

      - name: Record Business Skill Studio frontend
        id: record_frontend
        env:
          PLAYWRIGHT_CHANNEL: chrome
          FRONTEND_URL: ${{ inputs.frontend_url }}
          FRONTEND_START_COMMAND: ${{ inputs.frontend_start_command }}
          FRONTEND_RECORD_SCENARIO: business-skill-studio
        run: |
          if [ -z "$FRONTEND_URL" ] && [ -z "$FRONTEND_START_COMMAND" ]; then
            export FRONTEND_START_COMMAND="cd apps/business-skill-studio && npm run dev -- --hostname 127.0.0.1 --port 3000"
          fi
          npm run record:frontend

      - name: Upload frontend recording artifact backup
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: frontend-playwright-recording
          path: artifacts/frontend-recording
          if-no-files-found: error
          retention-days: 14

      - name: Publish frontend recording media to PR branch
        id: publish_media
        if: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository }}
        shell: bash
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin "${HEAD_BRANCH}"

          dest="pr-evidence/pr-${PR_NUMBER}/business-skill-studio/latest"
          rm -rf "$dest"
          mkdir -p "$dest"
          cp -R artifacts/frontend-recording/. "$dest/"
          find "$dest" -type f | sort > "$dest/manifest.txt"
          git add -f "$dest"

          if git diff --cached --quiet; then
            echo "published=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore: publish PR ${PR_NUMBER} frontend recording [skip ci]"
            pushed=false
            for attempt in 1 2 3; do
              if git push origin HEAD:"${HEAD_BRANCH}"; then
                pushed=true
                break
              fi
              git fetch origin "${HEAD_BRANCH}"
              git rebase "origin/${HEAD_BRANCH}"
            done
            if [ "$pushed" != "true" ]; then
              echo "Failed to push frontend recording media after 3 attempts" >&2
              exit 1
            fi
            echo "published=true" >> "$GITHUB_OUTPUT"
          fi

          echo "media_path=$dest" >> "$GITHUB_OUTPUT"
          echo "media_ref=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Update PR body with inline frontend recording
        if: ${{ github.event_name == 'pull_request' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          RUN_ID: ${{ github.run_id }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          ARTIFACT_URL: ${{ steps.upload.outputs.artifact-url }}
          TEST_OUTCOME: ${{ steps.record_frontend.outcome }}
          GITHUB_SHA: ${{ github.sha }}
          EVIDENCE_TITLE: Business Skill Studio frontend recording
          EVIDENCE_MARKER: business-skill-studio-recording
          EVIDENCE_MEDIA_PATH: ${{ steps.publish_media.outputs.media_path }}
          EVIDENCE_MEDIA_REF: ${{ steps.publish_media.outputs.media_ref }}
        run: node scripts/update-pr-evidence.mjs
