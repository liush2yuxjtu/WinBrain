name: Frontend Playwright Recording

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      frontend_url:
        description: Optional URL to record instead of auto-detecting a local dev server
        required: false
        type: string
      frontend_start_command:
        description: Optional command to start the frontend before recording
        required: false
        type: string

permissions:
  contents: read
  pull-requests: write
  issues: write
  actions: read

jobs:
  record:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install root npm dependencies
        run: npm install

      - name: Install Business Skill Studio dependencies
        working-directory: apps/business-skill-studio
        run: |
          cp package.json package.recording.original.json
          node - <<'NODE'
          const fs = require('node:fs')
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'))
          if (pkg.dependencies) {
            delete pkg.dependencies['@anthropic-ai/claude-agent-sdk']
          }
          fs.writeFileSync('package.json', `${JSON.stringify(pkg, null, 2)}\n`)
          NODE
          npm install --no-package-lock --legacy-peer-deps
          mkdir -p node_modules/@anthropic-ai/claude-agent-sdk
          cat > node_modules/@anthropic-ai/claude-agent-sdk/package.json <<'EOF'
          {"name":"@anthropic-ai/claude-agent-sdk","version":"0.0.0-recording-stub","type":"module","main":"index.js"}
          EOF
          cat > node_modules/@anthropic-ai/claude-agent-sdk/index.js <<'EOF'
          export async function* query() {
            yield { text: 'Recording stub response from Claude Agent SDK.' }
          }
          EOF
          mv package.recording.original.json package.json

      - name: Install Chrome for Playwright
        run: |
          npx playwright install --with-deps chrome

      - name: Record Business Skill Studio frontend
        env:
          PLAYWRIGHT_CHANNEL: chrome
          FRONTEND_URL: ${{ inputs.frontend_url }}
          FRONTEND_START_COMMAND: ${{ inputs.frontend_start_command }}
          FRONTEND_RECORD_SCENARIO: business-skill-studio
        run: |
          if [ -z "$FRONTEND_URL" ] && [ -z "$FRONTEND_START_COMMAND" ]; then
            export FRONTEND_START_COMMAND="cd apps/business-skill-studio && npm run dev -- --hostname 127.0.0.1 --port 3000"
          fi
          npm run record:frontend

      - name: Upload frontend recording artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-playwright-recording
          path: artifacts/frontend-recording
          if-no-files-found: error
          retention-days: 14

      - name: Comment artifact location on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const marker = '<!-- business-skill-studio-recording -->';
            const body = [
              marker,
              '',
              'Playwright frontend recording has been generated by CI.',
              '',
              `Download the artifact named \`frontend-playwright-recording\` from this workflow run: ${runUrl}`,
              '',
              'The artifact contains:',
              '- `frontend-page.png` — final full-page screenshot',
              '- `snapshots/` — staged screenshots of the Business Skill Studio flow',
              '- `summary.md` — target URL, recording mode, console output, and snapshot list',
              '- `video/` — Playwright browser video of the recorded flow',
              '',
              'These generated files are uploaded as workflow artifacts and are not tracked in git.'
            ].join('\n');

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100
            });
            const existing = comments.data.find((comment) => comment.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body
              });
            }
