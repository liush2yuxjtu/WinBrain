name: Frontend Playwright Recording

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      frontend_url:
        description: Optional URL to record instead of auto-detecting a local dev server
        required: false
        type: string
      frontend_start_command:
        description: Optional command to start the frontend before recording
        required: false
        type: string

concurrency:
  group: frontend-recording-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  actions: read

jobs:
  record:
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      ANTHROPIC_AUTH_TOKEN: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
      ANTHROPIC_BASE_URL: ${{ vars.ANTHROPIC_BASE_URL }}
      ANTHROPIC_MODEL: ${{ vars.ANTHROPIC_MODEL }}
      ANTHROPIC_DEFAULT_SONNET_MODEL: ${{ vars.ANTHROPIC_DEFAULT_SONNET_MODEL }}
      ANTHROPIC_DEFAULT_OPUS_MODEL: ${{ vars.ANTHROPIC_DEFAULT_OPUS_MODEL }}
      ANTHROPIC_DEFAULT_HAIKU_MODEL: ${{ vars.ANTHROPIC_DEFAULT_HAIKU_MODEL }}
      API_TIMEOUT_MS: ${{ vars.API_TIMEOUT_MS }}
      API_MAX_INPUT_TOKENS: ${{ vars.API_MAX_INPUT_TOKENS }}
      CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC: ${{ vars.CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC }}
      CLAUDE_CODE_MAX_CONTEXT_TOKENS: ${{ vars.CLAUDE_CODE_MAX_CONTEXT_TOKENS }}
      CLAUDE_CODE_AUTO_COMPACT_WINDOW: ${{ vars.CLAUDE_CODE_AUTO_COMPACT_WINDOW }}
      AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
      AUTH_USER_PASSWORD_HASH: ${{ secrets.AUTH_USER_PASSWORD_HASH }}
      AUTH_USER_EMAIL: ${{ vars.AUTH_USER_EMAIL }}
      AUTH_USER_NAME: ${{ vars.AUTH_USER_NAME }}
      AUTH_USER_ROLE: ${{ vars.AUTH_USER_ROLE }}
      AUTH_URL: ${{ vars.AUTH_URL }}
      NEXTAUTH_URL: ${{ vars.NEXTAUTH_URL }}
      FRONTEND_RECORD_EMAIL: ${{ vars.FRONTEND_RECORD_EMAIL }}
      FRONTEND_RECORD_PASSWORD: ${{ secrets.FRONTEND_RECORD_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Verify Agent SDK credentials
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [ "$EVENT_NAME" = "pull_request" ]; then
            echo "::notice::Using the deterministic SDK stub for stable visual PR evidence."
          elif [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "::error::Repository secret ANTHROPIC_API_KEY is not configured."
            exit 1
          fi

      - name: Install root npm dependencies
        run: npm install

      - name: Install Business Skill Studio dependencies
        working-directory: apps/business-skill-studio
        env:
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [ "$EVENT_NAME" = "pull_request" ]; then
            cp package.json package.recording.original.json
            node -e 'const fs=require("node:fs"); const pkg=JSON.parse(fs.readFileSync("package.json", "utf8")); if (pkg.dependencies) delete pkg.dependencies["@anthropic-ai/claude-agent-sdk"]; fs.writeFileSync("package.json", JSON.stringify(pkg, null, 2) + "\n")'
            npm install --no-package-lock --legacy-peer-deps
            node -e 'const fs=require("node:fs"); const dir="node_modules/@anthropic-ai/claude-agent-sdk"; fs.mkdirSync(dir, { recursive: true }); fs.writeFileSync(dir + "/package.json", JSON.stringify({ name: "@anthropic-ai/claude-agent-sdk", version: "0.0.0-recording-stub", type: "module", main: "index.js" }) + "\n"); fs.writeFileSync(dir + "/index.js", "export async function* query() {\n  yield { text: \"Recording stub response from Claude Agent SDK.\" }\n}\n")'
            mv package.recording.original.json package.json
          else
            npm install --no-package-lock --legacy-peer-deps
          fi

      - name: Configure deterministic PR recording authentication
        if: ${{ github.event_name == 'pull_request' }}
        working-directory: apps/business-skill-studio
        shell: bash
        env:
          RECORDING_EMAIL: recording@example.com
          RECORDING_PASSWORD: winbrain-recording-password
        run: |
          set -euo pipefail
          password_hash="$(node -e 'const bcrypt = require("bcryptjs"); process.stdout.write(bcrypt.hashSync(process.env.RECORDING_PASSWORD, 10));')"
          {
            echo "AUTH_SECRET=winbrain-pr-recording-only-secret-000000000000"
            echo "AUTH_USER_EMAIL=$RECORDING_EMAIL"
            echo "AUTH_USER_NAME=PR Recording User"
            echo "AUTH_USER_ROLE=admin"
            echo "AUTH_USER_PASSWORD_HASH=$password_hash"
            echo "AUTH_URL=http://127.0.0.1:3000"
            echo "NEXTAUTH_URL=http://127.0.0.1:3000"
            echo "FRONTEND_RECORD_EMAIL=$RECORDING_EMAIL"
            echo "FRONTEND_RECORD_PASSWORD=$RECORDING_PASSWORD"
          } >> "$GITHUB_ENV"

      - name: Verify manual recording authentication
        if: ${{ github.event_name != 'pull_request' }}
        shell: bash
        run: |
          set -euo pipefail
          missing=()
          for name in AUTH_SECRET AUTH_USER_EMAIL AUTH_USER_PASSWORD_HASH FRONTEND_RECORD_EMAIL FRONTEND_RECORD_PASSWORD; do
            if [ -z "$(printenv "$name" || true)" ]; then
              missing+=("$name")
            fi
          done
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::error::Missing recording authentication configuration: ${missing[*]}"
            exit 1
          fi

      - name: Build Business Skill Studio
        working-directory: apps/business-skill-studio
        run: npm run build

      - name: Install Chrome for Playwright
        run: npx playwright install --with-deps chrome

      - name: Load trusted recording and PR rendering tools
        id: trusted_tools
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set -euo pipefail
          mkdir -p .github/.trusted
          recorder=".github/.trusted/record-frontend.mjs"
          renderer="$RUNNER_TEMP/update-pr-evidence.mjs"

          if [ "$EVENT_NAME" = "pull_request" ]; then
            git fetch --no-tags --depth=1 origin "$BASE_SHA"
            git show "${BASE_SHA}:tools/record-frontend.mjs" > "$recorder"
            git show "${BASE_SHA}:scripts/update-pr-evidence.mjs" > "$renderer"
          else
            cp tools/record-frontend.mjs "$recorder"
            cp scripts/update-pr-evidence.mjs "$renderer"
          fi

          echo "recorder=$recorder" >> "$GITHUB_OUTPUT"
          echo "renderer=$renderer" >> "$GITHUB_OUTPUT"

      - name: Record Business Skill Studio frontend
        id: record_frontend
        continue-on-error: true
        env:
          PLAYWRIGHT_CHANNEL: chrome
          FRONTEND_URL: ${{ inputs.frontend_url }}
          FRONTEND_START_COMMAND: ${{ inputs.frontend_start_command }}
          FRONTEND_RECORD_SCENARIO: business-skill-studio
        run: |
          if [ -z "$FRONTEND_URL" ] && [ -z "$FRONTEND_START_COMMAND" ]; then
            export FRONTEND_START_COMMAND="cd apps/business-skill-studio && npm run start -- --hostname 127.0.0.1 --port 3000"
          fi
          node "${{ steps.trusted_tools.outputs.recorder }}"

      - name: Upload frontend recording artifact backup
        id: upload
        if: ${{ always() && !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: frontend-playwright-recording
          path: artifacts/frontend-recording
          if-no-files-found: error
          retention-days: 14

      - name: Publish frontend recording media to PR branch
        id: publish_media
        if: ${{ always() && !cancelled() && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository }}
        shell: bash
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin "${HEAD_BRANCH}:refs/remotes/origin/${HEAD_BRANCH}"
          git reset --hard "origin/${HEAD_BRANCH}"

          dest="pr-evidence/pr-${PR_NUMBER}/business-skill-studio/latest"
          rm -rf "$dest"
          mkdir -p "$dest"
          cp -R artifacts/frontend-recording/. "$dest/"

          video_file="$(find "$dest" -type f \( -name '*.webm' -o -name '*.mp4' -o -name '*.mov' \) | sort | head -n 1 || true)"
          if [ -n "$video_file" ]; then
            if ! command -v ffmpeg >/dev/null 2>&1; then
              sudo apt-get update
              sudo apt-get install -y ffmpeg
            fi
            ffmpeg -y -i "$video_file" -t 15 \
              -vf "fps=6,scale=720:-1:flags=lanczos,split[s0][s1];[s0]palettegen=max_colors=96[p];[s1][p]paletteuse=dither=bayer:bayer_scale=5" \
              "$dest/recording-preview.gif"
          fi

          find "$dest" -type f | sort > "$dest/manifest.txt"
          git add -f "$dest"

          if git diff --cached --quiet; then
            echo "published=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore: publish PR ${PR_NUMBER} frontend recording [skip ci]"
            pushed=false
            for attempt in 1 2 3; do
              if git push origin HEAD:"${HEAD_BRANCH}"; then
                pushed=true
                break
              fi
              git fetch origin "${HEAD_BRANCH}:refs/remotes/origin/${HEAD_BRANCH}"
              git rebase "origin/${HEAD_BRANCH}"
            done
            if [ "$pushed" != "true" ]; then
              echo "Failed to push frontend recording media after 3 attempts" >&2
              exit 1
            fi
            echo "published=true" >> "$GITHUB_OUTPUT"
          fi

          echo "media_path=$dest" >> "$GITHUB_OUTPUT"
          echo "media_ref=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Update PR body with inline frontend recording
        if: ${{ always() && !cancelled() && github.event_name == 'pull_request' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          RUN_ID: ${{ github.run_id }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          ARTIFACT_URL: ${{ steps.upload.outputs.artifact-url }}
          TEST_OUTCOME: ${{ steps.record_frontend.outcome }}
          GITHUB_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          EVIDENCE_TITLE: Business Skill Studio frontend recording
          EVIDENCE_MARKER: business-skill-studio-recording
          EVIDENCE_MEDIA_PATH: ${{ steps.publish_media.outputs.media_path }}
          EVIDENCE_MEDIA_REF: ${{ steps.publish_media.outputs.media_ref }}
        run: node "${{ steps.trusted_tools.outputs.renderer }}"

      - name: Fail if frontend recording failed
        if: ${{ steps.record_frontend.outcome == 'failure' }}
        run: exit 1
