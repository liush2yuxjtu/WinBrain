name: Frontend Playwright Recording

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      frontend_url:
        description: Optional URL to record instead of auto-detecting a local dev server
        required: false
        type: string
      frontend_start_command:
        description: Optional command to start the frontend before recording
        required: false
        type: string

permissions:
  contents: read
  pull-requests: write
  actions: read

jobs:
  record:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install root npm dependencies
        run: npm install

      - name: Install Business Skill Studio dependencies
        working-directory: apps/business-skill-studio
        run: npm install

      - name: Install Chrome for Playwright
        run: |
          npx playwright install --with-deps chrome

      - name: Record Business Skill Studio frontend
        env:
          PLAYWRIGHT_CHANNEL: chrome
          FRONTEND_URL: ${{ inputs.frontend_url }}
          FRONTEND_START_COMMAND: ${{ inputs.frontend_start_command }}
          FRONTEND_RECORD_SCENARIO: business-skill-studio
        run: |
          if [ -z "$FRONTEND_URL" ] && [ -z "$FRONTEND_START_COMMAND" ]; then
            export FRONTEND_START_COMMAND="cd apps/business-skill-studio && npm run dev -- --hostname 127.0.0.1 --port 3000"
          fi
          npm run record:frontend

      - name: Upload frontend recording artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-playwright-recording
          path: artifacts/frontend-recording
          if-no-files-found: error
          retention-days: 14

      - name: Comment artifact location on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              'Playwright frontend recording has been generated by CI.',
              '',
              `Download the artifact named \`frontend-playwright-recording\` from this workflow run: ${runUrl}`,
              '',
              'The artifact contains:',
              '- `frontend-page.png` — final full-page screenshot',
              '- `snapshots/` — staged screenshots of the Business Skill Studio flow',
              '- `summary.md` — target URL, recording mode, console output, and snapshot list',
              '- `video/` — Playwright browser video of the recorded flow'
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });
