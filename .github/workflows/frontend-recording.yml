name: Frontend Playwright Recording

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      frontend_url:
        description: Optional URL to record instead of auto-detecting a local dev server
        required: false
        type: string
      frontend_start_command:
        description: Optional command to start the frontend before recording
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write
  actions: read

jobs:
  record:
    runs-on: ubuntu-latest
    env:
      # Stored as a GitHub Actions secret. Never commit the credential itself.
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      # MiniMax's Anthropic-compatible endpoint accepts the same credential as a bearer token.
      ANTHROPIC_AUTH_TOKEN: ${{ secrets.ANTHROPIC_API_KEY }}
      ANTHROPIC_BASE_URL: https://api.minimaxi.com/anthropic
      ANTHROPIC_MODEL: MiniMax-M3
      ANTHROPIC_DEFAULT_SONNET_MODEL: MiniMax-M3
      ANTHROPIC_DEFAULT_OPUS_MODEL: MiniMax-M3
      ANTHROPIC_DEFAULT_HAIKU_MODEL: MiniMax-M3
      CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC: '1'
      API_TIMEOUT_MS: '3000000'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Verify Agent SDK credentials
        shell: bash
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "::error::Repository secret ANTHROPIC_API_KEY is not configured. Refusing to record the deterministic fallback."
            exit 1
          fi

      - name: Install root npm dependencies
        run: npm install

      - name: Install Business Skill Studio dependencies
        working-directory: apps/business-skill-studio
        run: npm install --no-package-lock --legacy-peer-deps

      - name: Install Chrome for Playwright
        run: |
          npx playwright install --with-deps chrome

      - name: Record Business Skill Studio frontend
        id: record_frontend
        env:
          PLAYWRIGHT_CHANNEL: chrome
          FRONTEND_URL: ${{ inputs.frontend_url }}
          FRONTEND_START_COMMAND: ${{ inputs.frontend_start_command }}
          FRONTEND_RECORD_SCENARIO: business-skill-studio
        run: |
          if [ -z "$FRONTEND_URL" ] && [ -z "$FRONTEND_START_COMMAND" ]; then
            export FRONTEND_START_COMMAND="cd apps/business-skill-studio && npm run dev -- --hostname 127.0.0.1 --port 3000"
          fi
          npm run record:frontend

      - name: Upload frontend recording artifact backup
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: frontend-playwright-recording
          path: artifacts/frontend-recording
          if-no-files-found: error
          retention-days: 14

      - name: Publish frontend recording media to PR branch
        id: publish_media
        if: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository }}
        shell: bash
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin "${HEAD_BRANCH}:refs/remotes/origin/${HEAD_BRANCH}"
          git reset --hard "origin/${HEAD_BRANCH}"

          dest="pr-evidence/pr-${PR_NUMBER}/business-skill-studio/latest"
          rm -rf "$dest"
          mkdir -p "$dest"
          cp -R artifacts/frontend-recording/. "$dest/"
          find "$dest" -type f | sort > "$dest/manifest.txt"
          git add -f "$dest"

          if git diff --cached --quiet; then
            echo "published=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore: publish PR ${PR_NUMBER} frontend recording [skip ci]"
            pushed=false
            for attempt in 1 2 3; do
              if git push origin HEAD:"${HEAD_BRANCH}"; then
                pushed=true
                break
              fi
              git fetch origin "${HEAD_BRANCH}:refs/remotes/origin/${HEAD_BRANCH}"
              git rebase "origin/${HEAD_BRANCH}"
            done
            if [ "$pushed" != "true" ]; then
              echo "Failed to push frontend recording media after 3 attempts" >&2
              exit 1
            fi
            echo "published=true" >> "$GITHUB_OUTPUT"
          fi

          echo "media_path=$dest" >> "$GITHUB_OUTPUT"
          echo "media_ref=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Update PR body with inline frontend recording
        if: ${{ github.event_name == 'pull_request' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          RUN_ID: ${{ github.run_id }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          ARTIFACT_URL: ${{ steps.upload.outputs.artifact-url }}
          TEST_OUTCOME: ${{ steps.record_frontend.outcome }}
          GITHUB_SHA: ${{ github.sha }}
          EVIDENCE_TITLE: Business Skill Studio frontend recording
          EVIDENCE_MARKER: business-skill-studio-recording
          EVIDENCE_MEDIA_PATH: ${{ steps.publish_media.outputs.media_path }}
          EVIDENCE_MEDIA_REF: ${{ steps.publish_media.outputs.media_ref }}
        run: node scripts/update-pr-evidence.mjs
