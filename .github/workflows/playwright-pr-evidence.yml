name: Playwright PR evidence

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: playwright-pr-evidence-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: write
  actions: read
  pull-requests: write

jobs:
  capture:
    name: Capture screenshots and video
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout PR head
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install root dependencies
        shell: bash
        run: |
          if [ -f package-lock.json ] || [ -f npm-shrinkwrap.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Install Business Skill Studio dependencies
        run: npm install --prefix apps/business-skill-studio --no-package-lock --legacy-peer-deps

      - name: Install Playwright browsers and system dependencies
        run: npx playwright install --with-deps chromium

      - name: Start the real Business Skill Studio
        shell: bash
        env:
          AUTH_SECRET: playwright-pr-evidence-auth-secret-32-bytes
          NEXTAUTH_URL: http://127.0.0.1:3000
          AUTH_USER_EMAIL: playwright@example.com
          AUTH_USER_NAME: Playwright Reviewer
          AUTH_USER_ROLE: admin
          AUTH_USER_PASSWORD_HASH: $2b$10$N9qo8uLOickgx2ZMRZoMyeIjZAgcfl7p92ldGxad68LJZdL17lhWy
          SKILL_STORE_DRIVER: filesystem
        run: |
          set -euo pipefail
          mkdir -p artifacts
          (
            cd apps/business-skill-studio
            nohup npm run dev -- --hostname 127.0.0.1 --port 3000 > ../../artifacts/business-skill-studio.log 2>&1 &
            echo $! > ../../artifacts/business-skill-studio.pid
          )

          for attempt in $(seq 1 60); do
            if curl --fail --silent --show-error http://127.0.0.1:3000/login > /dev/null; then
              exit 0
            fi
            sleep 2
          done

          cat artifacts/business-skill-studio.log
          echo "Business Skill Studio did not become reachable" >&2
          exit 1

      - name: Load trusted PR evidence renderer
        id: trusted_renderer
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set -euo pipefail
          git fetch --no-tags --depth=1 origin "$BASE_SHA"
          renderer="$RUNNER_TEMP/update-pr-evidence.mjs"
          git show "${BASE_SHA}:scripts/update-pr-evidence.mjs" > "$renderer"
          echo "path=$renderer" >> "$GITHUB_OUTPUT"

      - name: Run Playwright tests
        id: playwright
        continue-on-error: true
        env:
          PLAYWRIGHT_TARGET_URL: http://127.0.0.1:3000/login
        run: npm run test:e2e

      - name: Upload Playwright evidence artifact backup
        id: upload
        if: ${{ always() && !cancelled() }}
        uses: actions/upload-artifact@v5
        with:
          name: playwright-evidence-pr-${{ github.event.pull_request.number }}-run-${{ github.run_id }}
          path: |
            playwright-report/
            test-results/
            artifacts/
          if-no-files-found: warn
          retention-days: 30

      - name: Publish Playwright media to PR branch
        id: publish_media
        if: ${{ always() && !cancelled() && github.event.pull_request.head.repo.full_name == github.repository }}
        shell: bash
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          set -euo pipefail

          if [ -f artifacts/business-skill-studio.pid ]; then
            kill "$(cat artifacts/business-skill-studio.pid)" 2>/dev/null || true
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git reset --hard HEAD
          git pull --rebase origin "${HEAD_BRANCH}"

          dest="pr-evidence/pr-${PR_NUMBER}/playwright/latest"
          rm -rf "$dest"
          mkdir -p "$dest"

          if [ -d artifacts/screenshots ]; then
            mkdir -p "$dest/screenshots"
            cp -R artifacts/screenshots/. "$dest/screenshots/"
          fi

          if [ -d artifacts/playwright-output ]; then
            mkdir -p "$dest/videos"
            find artifacts/playwright-output -type f \( -name '*.webm' -o -name '*.mp4' -o -name '*.mov' \) -exec cp {} "$dest/videos/" \; || true
          fi

          video_file="$(find "$dest" -type f \( -name '*.webm' -o -name '*.mp4' -o -name '*.mov' \) | sort | head -n 1 || true)"
          if [ -n "$video_file" ]; then
            if ! command -v ffmpeg >/dev/null 2>&1; then
              sudo apt-get update
              sudo apt-get install -y ffmpeg
            fi
            ffmpeg -y -i "$video_file" -t 15 \
              -vf "fps=6,scale=720:-1:flags=lanczos,split[s0][s1];[s0]palettegen=max_colors=96[p];[s1][p]paletteuse=dither=bayer:bayer_scale=5" \
              "$dest/recording-preview.gif"
          fi

          find "$dest" -type f | sort > "$dest/manifest.txt"
          git add -f "$dest"

          if git diff --cached --quiet; then
            echo "published=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore: publish PR ${PR_NUMBER} Playwright evidence [skip ci]"
            pushed=false
            for attempt in 1 2 3; do
              if git push origin HEAD:"${HEAD_BRANCH}"; then
                pushed=true
                break
              fi
              git fetch origin "${HEAD_BRANCH}"
              git rebase "origin/${HEAD_BRANCH}"
            done
            if [ "$pushed" != "true" ]; then
              echo "Failed to push Playwright evidence media after 3 attempts" >&2
              exit 1
            fi
            echo "published=true" >> "$GITHUB_OUTPUT"
          fi

          echo "media_path=$dest" >> "$GITHUB_OUTPUT"
          echo "media_ref=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Update PR body with inline Playwright evidence
        if: ${{ always() && !cancelled() }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          RUN_ID: ${{ github.run_id }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          ARTIFACT_URL: ${{ steps.upload.outputs.artifact-url }}
          TEST_OUTCOME: ${{ steps.playwright.outcome }}
          GITHUB_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          EVIDENCE_TITLE: Playwright PR 视觉证据
          EVIDENCE_MARKER: playwright-evidence
          EVIDENCE_MEDIA_PATH: ${{ steps.publish_media.outputs.media_path }}
          EVIDENCE_MEDIA_REF: ${{ steps.publish_media.outputs.media_ref }}
        run: node "${{ steps.trusted_renderer.outputs.path }}"

      - name: Fail if Playwright failed
        if: ${{ steps.playwright.outcome == 'failure' }}
        run: exit 1
