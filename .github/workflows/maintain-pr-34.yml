name: Maintain PR 34

on:
  pull_request_target:
    types: [reopened]

permissions:
  contents: write

concurrency:
  group: maintain-pr-34
  cancel-in-progress: false

jobs:
  merge-and-validate:
    if: >-
      github.repository == 'liush2yuxjtu/WinBrain' &&
      github.event.pull_request.number == 34 &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v5
        with:
          repository: ${{ github.repository }}
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          persist-credentials: false

      - name: Merge main and resolve the two semantic conflicts
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git merge --no-commit --no-ff origin/main || true

          conflicts="$(git diff --name-only --diff-filter=U)"
          expected=$'apps/business-skill-studio/app/page.tsx\napps/business-skill-studio/components/studio-shell.tsx'
          if [ "$conflicts" != "$expected" ]; then
            printf 'Unexpected conflicts:\n%s\n' "$conflicts"
            exit 1
          fi

          # The PR shell already contains main's mobile focus/inert/accessibility work,
          # plus the intended SaaS navigation and data-source routing.
          git checkout --ours apps/business-skill-studio/components/studio-shell.tsx

          # Keep the PR workbench/Copilot UI, then layer in main's newer Skill-detail
          # persistence behavior and Skill Library management link.
          git checkout --ours apps/business-skill-studio/app/page.tsx
          python3 <<'PY'
          from pathlib import Path

          path = Path('apps/business-skill-studio/app/page.tsx')
          text = path.read_text()

          def replace_once(old: str, new: str) -> None:
              global text
              if new in text:
                  return
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'Expected one match, found {count}: {old[:100]!r}')
              text = text.replace(old, new, 1)

          replace_once('StoredSkillSummary,', 'StoredSkillDetail,')
          replace_once('useState<StoredSkillSummary | null>(null)', 'useState<StoredSkillDetail | null>(null)')
          replace_once(
              """      const data = await response.json() as { skill?: StoredSkillSummary }
      if (!data.skill) throw new Error('Save response did not include skill metadata')
      setSavedSkill(data.skill)""",
              """      const data = await response.json() as { skill?: StoredSkillDetail }
      if (!data.skill) throw new Error('Save response did not include canonical Skill content')
      setSavedSkill(data.skill)
      const savedDetail = data.skill
      setDraft([
        '## SKILL.md',
        '```markdown',
        savedDetail.skillMarkdown.trimEnd(),
        '```',
        savedDetail.evalsJson ? `\n## evals/evals.json\n\`\`\`json\n${savedDetail.evalsJson.trimEnd()}\n\`\`\`` : ''
      ].filter(Boolean).join('\n'))"""
          )
          replace_once(
              'onChange={(event) => setDraft(event.target.value)} placeholder="AI 生成的 SKILL.md 与 evals 会显示在这里。你也可以直接编辑。"',
              'onChange={(event) => { setDraft(event.target.value); setSavedSkill(null) }} placeholder="AI 生成的 SKILL.md 与 evals 会显示在这里。你也可以直接编辑。"'
          )
          replace_once(
              """                    ? <span className="success-message">✓ 已发布：{savedSkill.name} · v{savedSkill.version}{selectedOrganization ? ` · ${selectedOrganization.name}` : ''}</span>""",
              """                    ? <span className="success-message">✓ 已保存：{savedSkill.name} · v{savedSkill.version}{selectedOrganization ? ` · ${selectedOrganization.name}` : ''} · <a href={`/skills?selected=${encodeURIComponent(savedSkill.slug)}${savedSkill.organizationId ? `&organizationId=${encodeURIComponent(savedSkill.organizationId)}` : ''}`}>在 Skill 库中管理</a></span>"""
          )
          replace_once(
              """                      if (window.confirm('确定要清空当前生成的草稿吗？此操作不可撤销。')) setDraft('')""",
              """                      if (window.confirm('确定要清空当前生成的草稿吗？此操作不可撤销。')) {
                        setDraft('')
                        setSavedSkill(null)
                      }"""
          )
          path.write_text(text)
          PY

          git add apps/business-skill-studio/app/page.tsx apps/business-skill-studio/components/studio-shell.tsx
          if git diff --name-only --diff-filter=U | grep -q .; then
            echo 'Unresolved conflicts remain:'
            git diff --name-only --diff-filter=U
            exit 1
          fi

          rm -f .pr-34-conflicts.txt .github/workflows/maintain-pr-34.yml
          git add -A

      - name: Install locked dependencies
        working-directory: apps/business-skill-studio
        run: npm ci

      - name: Typecheck
        working-directory: apps/business-skill-studio
        run: npm run typecheck

      - name: Production build
        working-directory: apps/business-skill-studio
        run: npm run build

      - name: Commit and push validated merge
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
          REPOSITORY: ${{ github.repository }}
        run: |
          git commit -m "merge: synchronize PR 34 with main"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${REPOSITORY}.git"
          git push origin "HEAD:${HEAD_REF}"
