name: UAT Contract

on:
  pull_request:
    paths:
      - '.github/workflows/uat-contract.yml'
      - 'tools/babysit-pr42-focus-uat.py'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  fix-pr42-focus-uat:
    if: github.event_name == 'pull_request' && github.event.pull_request.number == 42 && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Check out PR head branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Apply deterministic keyboard-focus UAT fix
        run: python tools/babysit-pr42-focus-uat.py

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: apps/business-skill-studio/package-lock.json

      - name: Validate application gates
        working-directory: apps/business-skill-studio
        run: |
          set -euo pipefail
          npm ci
          npm run test:unit
          npm run typecheck
          npm run build

      - name: Validate recorder syntax and focus contract
        shell: bash
        run: |
          set -euo pipefail
          node --check tools/record-uiux-promax-uat.mjs
          grep -F "const focusTarget = page.locator('.sidebar-create')" tools/record-uiux-promax-uat.mjs
          grep -F "await page.keyboard.press('Shift+Tab')" tools/record-uiux-promax-uat.mjs
          grep -F 'Keyboard focus did not return to the new Skill link' tools/record-uiux-promax-uat.mjs
          git diff --check

      - name: Restore normal workflow, remove helper, and commit
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main
          git show origin/main:.github/workflows/uat-contract.yml > .github/workflows/uat-contract.yml
          rm -f tools/babysit-pr42-focus-uat.py
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add tools/record-uiux-promax-uat.mjs .github/workflows/uat-contract.yml tools/babysit-pr42-focus-uat.py
          git commit -m 'make UIUX focus UAT deterministic'
          branch="${{ github.event.pull_request.head.ref }}"
          git fetch origin "$branch"
          git rebase "origin/$branch"
          git push origin HEAD:"$branch"

      - name: Report failure to PR 42
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          payload="$(python - <<'PY'
          import json, os
          run_url = f"https://github.com/{os.environ['GITHUB_REPOSITORY']}/actions/runs/{os.environ['GITHUB_RUN_ID']}"
          print(json.dumps({'body': f'Babysit PR 42 focus-UAT fix failed: {run_url}'}))
          PY
          )"
          curl --fail-with-body -sS -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H 'Accept: application/vnd.github+json' \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/issues/42/comments" \
            -d "$payload"
