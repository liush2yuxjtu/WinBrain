name: UAT Contract

on:
  pull_request:
    paths:
      - 'docs/uat/**'
      - 'apps/business-skill-studio/**'
      - 'tests/**'
      - '.github/workflows/uat-contract.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-uat-catalogue:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Require exactly ten concrete UAT cases
        shell: bash
        run: |
          python - <<'PY'
          import re
          from pathlib import Path
          text = Path('docs/uat/acceptance-cases.md').read_text(encoding='utf-8')
          cases = re.split(r'(?=^## UAT-\d{2}\b)', text, flags=re.M)[1:]
          assert len(cases) == 10, f'expected exactly 10 UAT cases, found {len(cases)}'
          expected = [f'UAT-{i:02d}' for i in range(1, 11)]
          found = [re.match(r'## (UAT-\d{2})', case).group(1) for case in cases]
          assert found == expected, f'UAT IDs must be sequential: {found}'
          for case_id, case in zip(found, cases):
              for field in ['**Person:**', '**Task:**', '**Preconditions:**', '**Steps:**', '**Acceptance criteria:**']:
                  assert field in case, f'{case_id} missing {field}'
              assert len(re.search(r'\*\*Person:\*\*\s*(.+)', case).group(1).split()) >= 3
              assert len(re.search(r'\*\*Task:\*\*\s*(.+)', case).group(1).split()) >= 5
          print('Validated 10 concrete person/task UAT cases.')
          PY

  application-gates:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: winbrain_test
          POSTGRES_USER: winbrain
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U winbrain -d winbrain_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: local-root-password
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h 127.0.0.1 -uroot -plocal-root-password --silent"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: postgresql://winbrain@127.0.0.1:5432/winbrain_test?schema=public
      TEST_DATABASE_URL: postgresql://winbrain@127.0.0.1:5432/winbrain_test?schema=public
      TEST_CUSTOMER_DB_HOST: 127.0.0.1
      TEST_CUSTOMER_DB_PORT: '3306'
      TEST_CUSTOMER_DB_ROOT_PASSWORD: local-root-password
      DATA_SOURCE_ENCRYPTION_KEY: MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=
      ALLOW_PRIVATE_DATA_SOURCE_HOSTS: 'true'
    defaults:
      run:
        working-directory: apps/business-skill-studio
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/business-skill-studio/package-lock.json
      - run: npm ci
      - run: npm run db:migrate:deploy
      - name: Run unit tests
        shell: bash
        run: |
          set +e
          npm run test:unit > unit-tests.log 2>&1
          status=$?
          cat unit-tests.log
          exit $status
      - name: Upload unit-test diagnostics
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: uat-contract-unit-test-diagnostics
          path: apps/business-skill-studio/unit-tests.log
          if-no-files-found: warn
          retention-days: 7
      - run: npm run test:integration
      - run: npm run typecheck
      - run: npm run build
