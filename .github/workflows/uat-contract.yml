name: UAT Contract

on:
  pull_request:
    paths:
      - '.github/workflows/uat-contract.yml'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  fix-pr40-review-findings:
    if: github.event_name == 'pull_request' && github.event.pull_request.number == 40 && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Check out PR head branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Apply remaining CodeRabbit findings
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          def replace_once(path: str, old: str, new: str) -> None:
              file = Path(path)
              text = file.read_text(encoding='utf-8')
              if old not in text:
                  if new in text:
                      print(f'already fixed: {path}')
                      return
                  raise SystemExit(f'marker not found in {path}: {old[:120]!r}')
              file.write_text(text.replace(old, new, 1), encoding='utf-8')
              print(f'updated: {path}')

          install_workflow = '.github/workflows/install-claude-data-skills-once.yml'
          replace_once(
              install_workflow,
              '''permissions:
            contents: write''',
              '''# This workflow commits generated files back to its source branch, so runs
          # must queue rather than race at the final push.
          concurrency:
            group: install-claude-data-skills-${{ github.ref }}
            cancel-in-progress: false

          permissions:
            contents: write'''
          )

          dashboard = 'apps/business-skill-studio/.claude/skills/build-dashboard/SKILL.md'
          replace_once(
              dashboard,
              '''                            const total = context.dataset.data.reduce((a, b) => a + b, 0);
                                      const pct = ((context.parsed / total) * 100).toFixed(1);
                                      return `${context.label}: ${formatValue(context.parsed, 'number')} (${pct}%)`;''',
              '''                            const total = context.dataset.data.reduce((a, b) => a + b, 0);
                                      const pct = total > 0
                                          ? ((context.parsed / total) * 100).toFixed(1)
                                          : '0.0';
                                      return `${context.label}: ${formatValue(context.parsed, 'number')} (${pct}%)`;'''
          )

          package_script = Path('apps/business-skill-studio/.claude/skills/data-context-extractor/scripts/package_data_skill.py')
          package_script.write_text('''#!/usr/bin/env python3
          """
          Package a generated data analysis skill into a distributable .skill file (zip format).

          Usage:
              python package_data_skill.py <path/to/skill-folder> [output-directory]

          Example:
              python package_data_skill.py /home/claude/acme-data-analyst
              python package_data_skill.py /home/claude/acme-data-analyst /tmp/outputs
          """

          import sys
          import zipfile
          from pathlib import Path


          def validate_skill(skill_path: Path) -> tuple[bool, str]:
              """Basic validation of skill structure."""
              skill_md = skill_path / "SKILL.md"
              if not skill_md.exists():
                  return False, "Missing SKILL.md"

              content = skill_md.read_text(encoding="utf-8")
              if not content.startswith("---"):
                  return False, "SKILL.md missing YAML frontmatter"
              if "name:" not in content[:500]:
                  return False, "SKILL.md missing 'name' in frontmatter"
              if "description:" not in content[:1000]:
                  return False, "SKILL.md missing 'description' in frontmatter"
              if "[PLACEHOLDER]" in content or "[COMPANY]" in content:
                  return False, "SKILL.md contains unfilled placeholder text"
              return True, "Validation passed"


          def is_within(path: Path, parent: Path) -> bool:
              """Return True when path is parent itself or is located below parent."""
              return path == parent or parent in path.parents


          def package_skill(skill_path: str, output_dir: str = None) -> Path | None:
              """Package a skill folder into a zip file, returning its path on success."""
              skill_path = Path(skill_path).resolve()
              if not skill_path.exists():
                  print(f"Error: Skill folder not found: {skill_path}")
                  return None
              if not skill_path.is_dir():
                  print(f"Error: Path is not a directory: {skill_path}")
                  return None

              print("Validating skill...")
              valid, message = validate_skill(skill_path)
              if not valid:
                  print(f"Validation failed: {message}")
                  return None
              print(f"{message}\\n")

              skill_name = skill_path.name
              output_path = (
                  Path(output_dir).resolve()
                  if output_dir
                  else (skill_path.parent / "dist").resolve()
              )
              if is_within(output_path, skill_path):
                  print(f"Error: Output directory must be outside the input skill: {output_path}")
                  return None

              output_path.mkdir(parents=True, exist_ok=True)
              skill_filename = output_path / f"{skill_name}.zip"
              temporary_filename = output_path / f".{skill_name}.zip.tmp"
              temporary_filename.unlink(missing_ok=True)

              try:
                  with zipfile.ZipFile(temporary_filename, "w", zipfile.ZIP_DEFLATED) as zipf:
                      for file_path in skill_path.rglob("*"):
                          if not file_path.is_file():
                              continue

                          relative_file = file_path.relative_to(skill_path)
                          if any(part.startswith(".") for part in relative_file.parts):
                              continue
                          if "__pycache__" in relative_file.parts:
                              continue
                          if file_path.suffix == ".pyc":
                              continue
                          if file_path.name in [".DS_Store", "Thumbs.db"]:
                              continue

                          arcname = file_path.relative_to(skill_path.parent)
                          zipf.write(file_path, arcname)
                          print(f"  Added: {arcname}")

                  temporary_filename.replace(skill_filename)
                  print(f"\\nSuccessfully packaged skill to: {skill_filename}")
                  return skill_filename
              except Exception as error:
                  temporary_filename.unlink(missing_ok=True)
                  skill_filename.unlink(missing_ok=True)
                  print(f"Error creating zip file: {error}")
                  return None


          def main():
              if len(sys.argv) < 2:
                  print(__doc__)
                  sys.exit(1)

              skill_path = sys.argv[1]
              output_dir = sys.argv[2] if len(sys.argv) > 2 else None
              print(f"Packaging skill: {skill_path}")
              if output_dir:
                  print(f"   Output directory: {output_dir}")
              print()

              result = package_skill(skill_path, output_dir)
              sys.exit(0 if result else 1)


          if __name__ == "__main__":
              main()
          '''.replace('          ', ''), encoding='utf-8')
          print(f'updated: {package_script}')

          explore = 'apps/business-skill-studio/.claude/skills/explore-data/SKILL.md'
          replace_once(
              explore,
              '''**All columns:**
          - Null count and null rate
          - Distinct count and cardinality ratio (distinct / total)
          - Most common values (top 5-10 with frequencies)
          - Least common values (bottom 5 to spot anomalies)''',
              '''**All columns:**
          - Null count and null rate
          - Distinct count and cardinality ratio (distinct / total)
          - Apply the existing column classification before sampling values
          - For non-sensitive columns, show most common values (top 5-10 with frequencies) and least common values (bottom 5)
          - For sensitive columns (emails, names, identifiers, credentials, or free-form text), omit or redact raw values; hash or bucket identifiers where distribution insight is needed
          - Require explicit user opt-in before displaying raw sensitive samples. Treat upstream MCP masking as sufficient only when the connector contract explicitly guarantees it'''
          )
          replace_once(
              explore,
              '''| Column | Type | Description | Example Values | Notes |
          |--------|------|-------------|----------------|-------|
          | user_id | STRING | Unique user identifier | "usr_abc123" | FK to users.id |
          | event_type | STRING | Type of event | "click", "view", "purchase" | 15 distinct values |
          | revenue | DECIMAL | Transaction revenue in USD | 29.99, 149.00 | Null for non-purchase events |
          | created_at | TIMESTAMP | When the event occurred | 2024-01-15 14:23:01 | Partitioned on this column |''',
              '''| Column | Type | Description | Example Values (non-sensitive only) | Notes |
          |--------|------|-------------|----------------|-------|
          | user_id | STRING | Unique user identifier | `[redacted identifier]` | FK to users.id; hash or bucket unless raw display is explicitly approved |
          | event_type | STRING | Type of event | "click", "view", "purchase" | 15 distinct values |
          | revenue | DECIMAL | Transaction revenue in USD | 29.99, 149.00 | Null for non-purchase events |
          | created_at | TIMESTAMP | When the event occurred | 2024-01-15 14:23:01 | Partitioned on this column |

          Only include raw example values for columns classified as non-sensitive. Redact sensitive text, hash or bucket identifiers, and require explicit opt-in before exposing raw samples.'''
          )

          stats = 'apps/business-skill-studio/.claude/skills/statistical-analysis/SKILL.md'
          replace_once(
              stats,
              '''```python
          z_scores = (df['value'] - df['value'].mean()) / df['value'].std()
          outliers = df[abs(z_scores) > 3]  # More than 3 standard deviations
          ```''',
              '''```python
          standard_deviation = df['value'].std()
          if pd.isna(standard_deviation) or standard_deviation == 0:
              # Constant, singleton, or all-null inputs have no meaningful z-score outliers.
              outliers = df.iloc[0:0]
          else:
              z_scores = (df['value'] - df['value'].mean()) / standard_deviation
              outliers = df[abs(z_scores) > 3]  # More than 3 standard deviations
          ```'''
          )

          validate = 'apps/business-skill-studio/.claude/skills/validate-data/SKILL.md'
          replace_once(
              validate,
              '''**How to prevent**: Always aggregate from raw data. Never average pre-aggregated averages.''',
              '''**How to prevent**: Aggregate from raw data when available. Otherwise, combine pre-aggregated averages using the appropriate group-size weights; never take an unweighted average of averages.'''
          )

          write_query = 'apps/business-skill-studio/.claude/skills/write-query/SKILL.md'
          replace_once(
              write_query,
              '''- Prefer `EXISTS` over `IN` for subqueries with large result sets''',
              '''- Choose `IN` or `EXISTS` based on semantics, NULL handling, and the SQL dialect's query plan; benchmark when performance is material'''
          )
          PY
          git diff --check

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: apps/business-skill-studio/package-lock.json

      - name: Validate application gates
        working-directory: apps/business-skill-studio
        shell: bash
        run: |
          set -euo pipefail
          npm ci
          npm run test:unit
          npm run typecheck
          npm run build

      - name: Validate packaging safety and review markers
        shell: bash
        run: |
          set -euo pipefail
          script='apps/business-skill-studio/.claude/skills/data-context-extractor/scripts/package_data_skill.py'
          python -m py_compile "$script"

          tmp="$(mktemp -d)"
          mkdir -p "$tmp/smoke-skill/__pycache__"
          cat > "$tmp/smoke-skill/SKILL.md" <<'MD'
          ---
          name: smoke-skill
          description: Safe packaging smoke test.
          ---
          # Smoke Skill
          MD
          printf 'compiled-junk' > "$tmp/smoke-skill/__pycache__/module.pyc"
          (
            cd "$tmp/smoke-skill"
            python "$GITHUB_WORKSPACE/$script" "$tmp/smoke-skill"
          )
          test -s "$tmp/dist/smoke-skill.zip"
          ! unzip -l "$tmp/dist/smoke-skill.zip" | grep -E '__pycache__|\.pyc'
          if python "$script" "$tmp/smoke-skill" "$tmp/smoke-skill/output"; then
            echo 'Packaging unexpectedly accepted an output directory inside the skill.' >&2
            exit 1
          fi
          test ! -e "$tmp/smoke-skill/output/smoke-skill.zip"

          grep -F 'cancel-in-progress: false' .github/workflows/install-claude-data-skills-once.yml
          grep -F "const pct = total > 0" apps/business-skill-studio/.claude/skills/build-dashboard/SKILL.md
          grep -F 'explicit user opt-in' apps/business-skill-studio/.claude/skills/explore-data/SKILL.md
          grep -F 'pd.isna(standard_deviation)' apps/business-skill-studio/.claude/skills/statistical-analysis/SKILL.md
          grep -F 'group-size weights' apps/business-skill-studio/.claude/skills/validate-data/SKILL.md
          grep -F 'NULL handling' apps/business-skill-studio/.claude/skills/write-query/SKILL.md
          git diff --check

      - name: Restore normal UAT workflow and commit review fixes
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main
          git show origin/main:.github/workflows/uat-contract.yml > .github/workflows/uat-contract.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "address remaining Claude data skill review findings"
          branch="${{ github.event.pull_request.head.ref }}"
          for attempt in 1 2 3; do
            git fetch origin "$branch"
            remote_tip="$(git rev-parse "origin/$branch")"
            if git push --force-with-lease="refs/heads/$branch:$remote_tip" origin HEAD:"$branch"; then
              exit 0
            fi
            sleep 3
          done
          exit 1

      - name: Report failed review-fix run to PR 40
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          payload="$(python - <<'PY'
          import json, os
          run_url = f"https://github.com/{os.environ['GITHUB_REPOSITORY']}/actions/runs/{os.environ['GITHUB_RUN_ID']}"
          print(json.dumps({'body': f'Babysit PR 40 review-fix workflow failed: {run_url}'}))
          PY
          )"
          curl --fail-with-body -sS -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/issues/40/comments" \
            -d "$payload"
