name: Babysit PR 40 review fixes v3

on:
  push:
    branches:
      - agent/default-claude-data-skills
    paths:
      - .github/workflows/babysit-pr-40-review-fixes-v3.yml

permissions:
  contents: write

concurrency:
  group: babysit-pr-40-review-fixes-v3
  cancel-in-progress: false

jobs:
  fix-review-comments:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/default-claude-data-skills
          fetch-depth: 0

      - name: Apply all unresolved review fixes
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          def replace(path, old, new):
              p = Path(path)
              text = p.read_text()
              if old not in text:
                  raise SystemExit(f"Expected text not found in {path}: {old[:120]!r}")
              p.write_text(text.replace(old, new, 1))

          # 1. Serialize one-time installer pushes.
          replace(
              '.github/workflows/install-claude-data-skills-once.yml',
              'permissions:\n  contents: write\n\njobs:',
              'permissions:\n  contents: write\n\nconcurrency:\n  group: install-claude-data-skills-${{ github.ref }}\n  cancel-in-progress: false\n\njobs:',
          )

          # 2-4. Make packaging output safe, exclude caches, clean partial archives.
          replace(
              'apps/business-skill-studio/.claude/skills/data-context-extractor/scripts/package_data_skill.py',
              '''    if output_dir:\n        output_path = Path(output_dir).resolve()\n    else:\n        output_path = Path.cwd()\n\n    output_path.mkdir(parents=True, exist_ok=True)\n    skill_filename = output_path / f"{skill_name}.zip"\n''',
              '''    if output_dir:\n        output_path = Path(output_dir).resolve()\n    else:\n        output_path = skill_path.parent / "dist"\n\n    try:\n        output_path.relative_to(skill_path)\n    except ValueError:\n        pass\n    else:\n        print(f"Error: Output directory must be outside the input skill: {output_path}")\n        return None\n\n    output_path.mkdir(parents=True, exist_ok=True)\n    skill_filename = output_path / f"{skill_name}.zip"\n''',
          )
          replace(
              'apps/business-skill-studio/.claude/skills/data-context-extractor/scripts/package_data_skill.py',
              '''                    if file_path.name in ['__pycache__', '.DS_Store', 'Thumbs.db']:\n                        continue\n''',
              '''                    if '__pycache__' in relative_file.parts or file_path.suffix == '.pyc':\n                        continue\n                    if file_path.name in ['.DS_Store', 'Thumbs.db']:\n                        continue\n''',
          )
          replace(
              'apps/business-skill-studio/.claude/skills/data-context-extractor/scripts/package_data_skill.py',
              '''    except Exception as e:\n        print(f"Error creating zip file: {e}")\n        return None\n''',
              '''    except Exception as e:\n        skill_filename.unlink(missing_ok=True)\n        print(f"Error creating zip file: {e}")\n        return None\n''',
          )

          # 5. Gate raw examples for sensitive columns.
          replace(
              'apps/business-skill-studio/.claude/skills/explore-data/SKILL.md',
              '''**All columns:**\n- Null count and null rate\n- Distinct count and cardinality ratio (distinct / total)\n- Most common values (top 5-10 with frequencies)\n- Least common values (bottom 5 to spot anomalies)\n''',
              '''**All columns:**\n- Null count and null rate\n- Distinct count and cardinality ratio (distinct / total)\n- Use the existing column classification before sampling values. For sensitive columns (emails, names, identifiers, free-form text, secrets), skip or redact raw values; hash or bucket identifiers where useful.\n- Show most/least common raw values only for non-sensitive columns. Raw samples from sensitive columns require explicit user opt-in and confirmation that the connector has applied masking.\n''',
          )
          replace(
              'apps/business-skill-studio/.claude/skills/explore-data/SKILL.md',
              '| Column | Type | Description | Example Values | Notes |\n|--------|------|-------------|----------------|-------|',
              '| Column | Type | Description | Example Values (redacted for sensitive columns) | Notes |\n|--------|------|-------------|-----------------------------------------------|-------|',
          )
          replace(
              'apps/business-skill-studio/.claude/skills/explore-data/SKILL.md',
              '| user_id | STRING | Unique user identifier | "usr_abc123" | FK to users.id |',
              '| user_id | STRING | Unique user identifier | `hash:8f14e45f` (redacted) | FK to users.id; raw identifiers require explicit opt-in |',
          )

          # 6. Guard z-score denominator.
          replace(
              'apps/business-skill-studio/.claude/skills/statistical-analysis/SKILL.md',
              '''```python\nz_scores = (df['value'] - df['value'].mean()) / df['value'].std()\noutliers = df[abs(z_scores) > 3]  # More than 3 standard deviations\n```''',
              '''```python\nstd = df['value'].std()\nif pd.isna(std) or std == 0:\n    outliers = df.iloc[0:0]  # Constant, singleton, or all-null data has no defined z-score\nelse:\n    z_scores = (df['value'] - df['value'].mean()) / std\n    outliers = df[abs(z_scores) > 3]  # More than 3 standard deviations\n```''',
          )

          # 7. Permit correctly weighted averages.
          replace(
              'apps/business-skill-studio/.claude/skills/validate-data/SKILL.md',
              '**How to prevent**: Always aggregate from raw data. Never average pre-aggregated averages.',
              '**How to prevent**: Aggregate from raw data when available. Otherwise, combine pre-aggregated averages using the appropriate group-size weights; never take an unweighted average of averages.',
          )

          # 8. Make IN vs EXISTS guidance semantic and dialect-aware.
          replace(
              'apps/business-skill-studio/.claude/skills/write-query/SKILL.md',
              '- Prefer `EXISTS` over `IN` for subqueries with large result sets',
              '- Choose `IN` or `EXISTS` based on semantics, null handling, and the SQL dialect\'s query plan; benchmark when performance is material',
          )

          # Remove this one-time workflow from the resulting branch.
          Path('.github/workflows/babysit-pr-40-review-fixes-v3.yml').unlink()
          PY

      - name: Validate focused changes
        shell: bash
        run: |
          python3 -m py_compile apps/business-skill-studio/.claude/skills/data-context-extractor/scripts/package_data_skill.py
          node apps/business-skill-studio/tests/uat-list-claude-skills.mjs
          git diff --check

      - name: Commit and push fixes
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: address remaining PR 40 review comments"
          git push origin HEAD:agent/default-claude-data-skills
