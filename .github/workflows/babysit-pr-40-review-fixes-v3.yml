name: Babysit PR 40 review fixes v3

on:
  push:
    branches:
      - agent/default-claude-data-skills
    paths:
      - .github/workflows/babysit-pr-40-review-fixes-v3.yml

permissions:
  contents: write

concurrency:
  group: babysit-pr-40-review-fixes-v3
  cancel-in-progress: false

jobs:
  fix-review-comments:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/default-claude-data-skills
          fetch-depth: 0

      - name: Apply remaining review fixes
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          def replace(path, old, new):
              p = Path(path)
              text = p.read_text()
              if old not in text:
                  raise SystemExit(f"Expected text not found in {path}: {old[:120]!r}")
              p.write_text(text.replace(old, new, 1))

          replace(
              'apps/business-skill-studio/.claude/skills/explore-data/SKILL.md',
              '''**All columns:**\n- Null count and null rate\n- Distinct count and cardinality ratio (distinct / total)\n- Most common values (top 5-10 with frequencies)\n- Least common values (bottom 5 to spot anomalies)\n''',
              '''**All columns:**\n- Null count and null rate\n- Distinct count and cardinality ratio (distinct / total)\n- Use the existing column classification before sampling values. For sensitive columns (emails, names, identifiers, free-form text, secrets), skip or redact raw values; hash or bucket identifiers where useful.\n- Show most/least common raw values only for non-sensitive columns. Raw samples from sensitive columns require explicit user opt-in and confirmation that the connector has applied masking.\n''',
          )
          replace(
              'apps/business-skill-studio/.claude/skills/explore-data/SKILL.md',
              '| Column | Type | Description | Example Values | Notes |\n|--------|------|-------------|----------------|-------|',
              '| Column | Type | Description | Example Values (redacted for sensitive columns) | Notes |\n|--------|------|-------------|-----------------------------------------------|-------|',
          )
          replace(
              'apps/business-skill-studio/.claude/skills/explore-data/SKILL.md',
              '| user_id | STRING | Unique user identifier | "usr_abc123" | FK to users.id |',
              '| user_id | STRING | Unique user identifier | `hash:8f14e45f` (redacted) | FK to users.id; raw identifiers require explicit opt-in |',
          )
          replace(
              'apps/business-skill-studio/.claude/skills/validate-data/SKILL.md',
              '**How to prevent**: Always aggregate from raw data. Never average pre-aggregated averages.',
              '**How to prevent**: Aggregate from raw data when available. Otherwise, combine pre-aggregated averages using the appropriate group-size weights; never take an unweighted average of averages.',
          )

          Path('.github/workflows/babysit-pr-40-review-fixes-v3.yml').unlink()
          PY

      - name: Validate focused changes
        run: |
          node apps/business-skill-studio/tests/uat-list-claude-skills.mjs
          git diff --check

      - name: Commit and push fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: finish PR 40 review comments"
          git push origin HEAD:agent/default-claude-data-skills
