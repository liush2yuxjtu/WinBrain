name: Database Integration

on:
  pull_request:
    branches: [main, feat/postgres-skill-store-v2]
    paths:
      - 'apps/business-skill-studio/**'
      - 'tools/verify-skill-database.mjs'
      - '.github/workflows/database-integration.yml'
      - '.github/workflows/docker-postgres-kimi-uat.yml'
  push:
    branches: [main]
    paths:
      - 'apps/business-skill-studio/**'
      - 'tools/verify-skill-database.mjs'
      - '.github/workflows/database-integration.yml'
      - '.github/workflows/docker-postgres-kimi-uat.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  database-integration:
    name: Docker PostgreSQL 与 MySQL 集成测试
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: winbrain_test
          POSTGRES_USER: winbrain
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U winbrain -d winbrain_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: 'yes'
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h 127.0.0.1 -uroot --silent"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: postgresql://winbrain@127.0.0.1:5432/winbrain_test?schema=public
      TEST_DATABASE_URL: postgresql://winbrain@127.0.0.1:5432/winbrain_test?schema=public
      TEST_CUSTOMER_DB_HOST: 127.0.0.1
      TEST_CUSTOMER_DB_PORT: '3306'
      TEST_CUSTOMER_DB_ROOT_PASSWORD: ''
      DATA_SOURCE_ENCRYPTION_KEY: MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=
      ALLOW_PRIVATE_DATA_SOURCE_HOSTS: 'true'
    defaults:
      run:
        working-directory: apps/business-skill-studio

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Apply Docker PostgreSQL migrations
        run: npm run db:migrate:deploy

      - name: Run filesystem, encryption, and validation tests
        run: npm run test:unit

      - name: Run PostgreSQL and customer database integration tests
        run: npm run test:integration

      - name: Typecheck application
        run: |
          set +e
          npm run typecheck > typecheck.log 2>&1
          status=$?
          cat typecheck.log
          exit $status

      - name: Build application
        run: |
          set +e
          npm run build > build.log 2>&1
          status=$?
          cat build.log
          exit $status

      - name: Upload validation diagnostics
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: validation-diagnostics
          path: |
            apps/business-skill-studio/typecheck.log
            apps/business-skill-studio/build.log
          if-no-files-found: warn
          retention-days: 7

      - name: Document live UAT separation
        run: |
          echo "Live Kimi, temporary Auth, and PostgreSQL UI readback run in the protected Docker PostgreSQL + Kimi UAT workflow."
          echo "This pull-request job is deterministic and receives no live model credential."
