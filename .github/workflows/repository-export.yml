name: Repository Export

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  export:
    if: github.repository == 'liush2yuxjtu/WinBrain'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Fetch repository refs
        run: |
          git fetch --force origin '+refs/heads/*:refs/remotes/origin/*' '+refs/pull/*/head:refs/remotes/pull/*/head'
      - name: Package working tree and Git objects
        run: tar --exclude='./repository.tar.gz' -czf repository.tar.gz .
      - name: Upload repository snapshot
        uses: actions/upload-artifact@v5
        with:
          name: repository-export-${{ github.event.pull_request.number }}-${{ github.run_id }}
          path: repository.tar.gz
          retention-days: 1
