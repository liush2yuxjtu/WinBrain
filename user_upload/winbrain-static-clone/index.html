<body>
<div id="app" class="shell">
  <aside id="sidebar" class="sidebar">
    <div class="brand">
      <img src="assets/sidebar-icons/welcome.png" alt="WinBrain" />
      <div class="brand-title">WinBrain</div>
      <button class="collapse" id="collapseBtn" title="折叠侧边栏">⌜</button>
    </div>
    <nav class="nav"><ul class="nav-section" id="navList"></ul></nav>
    <div class="footer">
      <button class="nav-item" data-page="help"><span style="font-size:20px">?</span><span>帮助中心</span></button>
      <button class="nav-item" id="settingsBtn"><img src="assets/sidebar-icons/settings.png" alt=""/><span>设置</span><span class="user-chip">e2e</span></button>
    </div>
  </aside>
  <main id="main" class="main"></main>
  <button class="floating-bot" id="botBtn" title="打开小赢">🤖</button>
  <div class="toast" id="toast"></div>
</div>
<div id="settingsModal" class="modal-backdrop">
  <div class="modal">
    <div class="modal-head"><strong>设置与偏好</strong><button class="btn ghost" data-close-modal>关闭</button></div>
    <div class="modal-body grid two">
      <div class="card"><div class="card-head"><div class="card-title"><span class="icon-box">🎨</span><div><h3>外观</h3><p>静态稿保留 WinBrain 亮色专家工作台风格。</p></div></div></div><div class="card-body"><label class="chip"><input type="checkbox" id="compactToggle"> 紧凑密度</label></div></div>
      <div class="card"><div class="card-head"><div class="card-title"><span class="icon-box green">🧭</span><div><h3>导航</h3><p>侧边栏可折叠，所有页面均为本地静态交互。</p></div></div></div><div class="card-body"><button class="btn" onclick="resetDemo()">重置演示数据</button></div></div>
    </div>
  </div>
</div>
<script>
const $ = (sel, root=document) => root.querySelector(sel);
const $$ = (sel, root=document) => Array.from(root.querySelectorAll(sel));
const pages = {
  newchat:{label:'新建对话', icon:'new-chat'}, chats:{label:'历史对话', icon:'history-chats'}, config:{label:'配置中心', icon:'config-center', chev:true}, assets:{label:'资产管理', icon:'ai-center', chev:true}, analytics:{label:'用量统计', icon:'analytics'}, graph:{label:'知识图谱', icon:'ontology-center'}, import:{label:'知识图谱编辑器 · 赢家', icon:'ontology-center'}, xiaoying:{label:'小赢', icon:'ontology-center'}, dispatch:{label:'调度中心', icon:'dispatch-center'}, messages:{label:'消息中心', icon:'message-center'}
};
const phases=['准备输入','生成本体','精调优化','版本管理','前线诊断'];
const sampleMd = `# AI 诊断助手 — 业务流程文档\n\n## 一、全范围筛查\n开始出货量分析 → 选择诊断切入点 KPI: Indirect Shipment → 全范围筛查 by RD x 品类。\n\n## 二、下钻归因\n选择 RD x 品类组合下钻，比较近期趋势 vs PP，判断区域、门店或全国性问题。\n\n## 三、单店 D-S-P-M 诊断\n检查分销、货架、价格、助销执行，并汇总门店结论。`;
const sampleTables = [{table:'dws_sales_order',cols:18},{table:'dim_dealer',cols:12},{table:'fact_store_visit',cols:24},{table:'dim_product_sku',cols:16},{table:'ads_rd_category_kpi',cols:21}];
const demoGraph = () => ({name:'FMCG 业务诊断本体', version:1, updatedAt:new Date().toISOString(), nodes:[
  {id:'start',label:'全范围筛查',kind:'入口',x:110,y:150,color:'#818cf8',desc:'按 RD x 品类扫描 IYA 趋势，定位 Top N 问题。'},
  {id:'trend',label:'趋势判断',kind:'阈值门',x:320,y:90,color:'#f59e0b',desc:'比较近期趋势、PP、IYA 阈值。'},
  {id:'dealer',label:'经销商归因',kind:'归因',x:520,y:160,color:'#60a5fa',desc:'判断个体执行问题或区域性问题。'},
  {id:'dspm',label:'D-S-P-M 单店诊断',kind:'分析包',x:320,y:270,color:'#10b981',desc:'检查分销、货架、价格、助销。'},
  {id:'report',label:'诊断报告',kind:'结论',x:720,y:230,color:'#ef4444',desc:'输出自然语言结论和行动建议。'}], edges:[['start','trend'],['trend','dealer'],['trend','dspm'],['dealer','report'],['dspm','report']], entryNodeIds:['start']});
let state = JSON.parse(localStorage.getItem('winbrain-static-state')||'{}');
state = Object.assign({page:'import', businessText:'', dbConnected:false, graph:null, versions:[], chatMessages:[], selectedNode:null, generating:false}, state);
function save(){localStorage.setItem('winbrain-static-state', JSON.stringify(state));}
function icon(name){return `assets/sidebar-icons/${name}.png`}
function toast(msg){const el=document.createElement('div');el.className='toast-msg';el.textContent=msg;$('#toast').appendChild(el);setTimeout(()=>el.remove(),2600)}
function resetDemo(){localStorage.removeItem('winbrain-static-state'); state={page:'import',businessText:'',dbConnected:false,graph:null,versions:[],chatMessages:[],selectedNode:null}; save(); render(); toast('已重置静态演示数据')}
window.resetDemo=resetDemo;
function navTo(page){state.page=page; save(); render();}
function renderNav(){const list=$('#navList'); list.innerHTML=''; Object.entries(pages).forEach(([key,p])=>{const b=document.createElement('button'); b.className='nav-item '+(isActive(key)?'active':''); b.dataset.page=key; b.innerHTML=`<img src="${icon(p.icon)}" alt=""><span>${p.label}</span>${p.chev?'<span class="chev">›</span>':''}`; b.onclick=()=>navTo(key); const li=document.createElement('li'); li.appendChild(b); list.appendChild(li);});}
function isActive(key){ if(key==='import') return ['import','generate','chat','review'].includes(state.page); return state.page===key;}
function layout({crumb='工作区 / 业务知识工坊', title='专家工作台', desc='', phase=0, badge='', content='', bottom=''}){return `<section class="stage"><header class="topbar"><div class="top-inner"><nav class="crumb">${crumb.split('/').map((x,i)=>i===crumb.split('/').length-1?`<b>${x.trim()}</b>`:`<span>${x.trim()}</span><span>/</span>`).join('')}</nav><div class="title-row"><div class="title"><h1>${title}</h1><p>${desc}</p></div>${badge}</div>${phase?progress(phase):''}</div></header><div class="content ${['chat','xiaoying'].includes(state.page)?'wide':''}">${content}</div>${bottom?`<footer class="bottom-nav"><div class="bottom-inner">${bottom}</div></footer>`:''}</section>`}
function progress(current){let html='<div class="progress">'; phases.forEach((p,i)=>{ if(i>0) html+=`<div class="step-line ${i<current?'done':''}"></div>`; html+=`<div class="step ${i+1<current?'done':i+1===current?'active':''}"><div class="step-num">${i+1<current?'✓':i+1}</div><div>${p}</div></div>`}); return html+'</div>'}
function statusBadge(){return `<span class="badge ${state.dbConnected?'green':'gray'}">${state.dbConnected?'● 数据已连接':'● 数据未连接'}</span>`}
function renderImport(){const ready=state.businessText.trim()&&state.dbConnected; return layout({crumb:'工作区 / 业务知识工坊 / 准备输入',title:'准备输入',desc:'上传业务流程文档并连接数据源，为诊断图谱的构建打好基础。',phase:1,badge:statusBadge(),content:`
  <div class="grid two">
    <section class="card"><div class="card-head"><div class="card-title"><span class="icon-box">📄</span><div><h3>业务流程文档</h3><p>拖入 .md 文件，或使用预设示例</p></div></div></div><div class="card-body">
      <div class="dropzone" id="dropzone"><div class="big">☁️</div><strong>${state.businessText?'已加载文档 · 可继续编辑':'把业务流程.md 拖到这里，或点击选择文件'}</strong><p class="muted">支持 .md / .markdown / .txt，最大 2MB</p><input type="file" id="fileInput" accept=".md,.markdown,.txt" hidden></div>
      <div style="height:12px"></div><textarea id="businessText" class="textarea" placeholder="或在此直接粘贴业务流程文档 Markdown 内容…">${escapeHtml(state.businessText)}</textarea>
      <div class="toolbar" style="margin-top:12px"><button class="btn" id="presetBusiness">✦ 使用预设业务</button><button class="btn ghost" id="clearBusiness">清空</button><span class="tiny" id="bizStats">${state.businessText.length} 字符</span></div>
    </div></section>
    <section class="card"><div class="card-head"><div class="card-title"><span class="icon-box green">🛢️</span><div><h3>数据源</h3><p>选择数据源类型并模拟连接体检</p></div></div>${statusBadge()}</div><div class="card-body">
      <div class="option-grid">
        <button class="option selected"><h4>内置演示数据集 <span class="badge green" style="padding:3px 7px">推荐</span></h4><p>5 张业务表示例，适合快速演示图谱抽取。</p></button>
        <button class="option"><h4>OceanBase / MySQL</h4><p>填写 host / port / database / user / password（本静态稿仅演示，不保存凭据）。</p></button>
        <button class="option"><h4>Supabase / PostgreSQL</h4><p>导入 URL 与匿名 key，用于真实环境配置。</p></button>
        <button class="option"><h4>PostgreSQL</h4><p>连接业务明细表与维度表。</p></button>
      </div>
      <div class="divider"></div><textarea class="textarea" style="min-height:88px" placeholder="粘贴数据库连接串或自然语言描述…（请勿在演示稿中填入真实密码）">${state.dbConnected?'使用内置演示数据集（5 张表，已连通）':''}</textarea>
      <div class="toolbar" style="margin-top:12px"><button class="btn primary" id="connectDb">🔌 ${state.dbConnected?'重新体检':'连接内置演示数据集'}</button><button class="btn green" id="useDb">✦ 使用预设 DB（演示）</button></div>
      ${state.dbConnected?`<div class="divider"></div><div class="chips">${sampleTables.map(t=>`<span class="chip green">🛢️ ${t.table} · ${t.cols} 列</span>`).join('')}</div>`:`<p class="tiny">数据库表头将作为抽取节点的口径依据；本静态稿不会发起真实网络连接。</p>`}
    </div></section>
  </div>
  <div class="ready-row"><div><strong>${ready?'输入已就绪，可以进入下一步':'请完成两项输入'}</strong><p class="muted" style="margin:4px 0 0">业务文档 ${state.businessText.trim()?'✓':'— 待上传'} · 数据源 ${state.dbConnected?'✓':'— 待连接'}</p></div><span class="badge ${ready?'green':'gray'}">${ready?'Ready':'Waiting'}</span></div>
`,bottom:`<button class="btn" onclick="toast('这里是工作台入口静态态')">← 返回工作台</button><button class="btn primary" ${ready?'':'disabled'} onclick="navTo('generate')">下一步：生成本体 →</button>`})}
function wireImport(){const dz=$('#dropzone'), fi=$('#fileInput'), ta=$('#businessText'); if(!dz)return; dz.onclick=()=>fi.click(); dz.ondragover=e=>{e.preventDefault();dz.classList.add('drag')}; dz.ondragleave=()=>dz.classList.remove('drag'); dz.ondrop=e=>{e.preventDefault();dz.classList.remove('drag'); readFile(e.dataTransfer.files[0])}; fi.onchange=e=>readFile(e.target.files[0]); function readFile(file){if(!file)return; file.text().then(t=>{state.businessText=t; save(); render(); toast('已读取文件：'+file.name)})} ta.oninput=e=>{state.businessText=e.target.value; save(); $('#bizStats').textContent=state.businessText.length+' 字符'}; $('#presetBusiness').onclick=()=>{state.businessText=sampleMd; save(); render(); toast('已填充预设业务文档')}; $('#clearBusiness').onclick=()=>{state.businessText=''; save(); render()}; $('#connectDb').onclick=$('#useDb').onclick=()=>{state.dbConnected=true; save(); render(); toast('数据源体检通过（静态模拟）')}}
function renderGenerate(){const hasInput=state.businessText.trim().length>0; const hasGraph=!!state.graph; if(!hasInput && !hasGraph) return layout({crumb:'工作区 / 赢家工作台 · 本体工厂', title:'生成图谱', desc:'请先回到准备输入阶段上传业务流程文档。', phase:2, content:`<div class="empty-center"><div class="empty-card"><div style="font-size:42px">📄</div><h2>尚未上传业务流程文档</h2><p>请先在上一阶段完成输入准备。</p><button class="btn primary" onclick="navTo('import')">← 返回准备输入</button></div></div>`, bottom:`<button class="btn" onclick="navTo('import')">← 上一步</button><span class="tiny">完成生成后可进入下一阶段</span><button class="btn" disabled>下一步 →</button>`});
return layout({crumb:'赢家工作台 · 本体工厂', title:'生成图谱', desc:'小赢将根据业务文档自动抽取诊断知识，构建可视化本体图谱。', phase:2, content:`
  <div class="grid two" style="grid-template-columns:3fr 2fr">
    <div class="grid">
      <section class="card"><div class="card-head"><div class="card-title"><span class="icon-box">📄</span><div><h3>业务流程文档</h3><p>${state.businessText.length} 字符 · Markdown 预览</p></div></div><button class="btn ghost" id="editBack">编辑</button></div><div class="card-body"><pre style="white-space:pre-wrap;line-height:1.6;color:#475569;margin:0;max-height:260px;overflow:auto">${escapeHtml(state.businessText.slice(0,900))}</pre></div></section>
      <section class="card"><div class="card-head"><div class="card-title"><span class="icon-box green">🛢️</span><div><h3>数据库表头</h3><p>${state.dbConnected?'已连接 · 5 张表':'未连接'}</p></div></div></div><div class="card-body"><div class="chips">${sampleTables.map(t=>`<span class="chip">${t.table} · ${t.cols} 列</span>`).join('')}</div></div></section>
    </div>
    <div class="grid">
      <button class="btn ${hasGraph?'green':'primary'}" id="generateBtn" style="height:52px;font-size:16px">${hasGraph?'↻ 重新生成':'⚡ 生成图谱'}</button>
      <section class="card" id="generationBox"><div class="card-body">${state.generating?generationHtml():hasGraph?summaryHtml(state.graph):'<p class="muted">点击生成后将模拟 AI 抽取：实体、关系、阈值、分析包与报告节点。</p>'}</div></section>
    </div>
  </div>
`,bottom:`<button class="btn" onclick="navTo('import')">← 上一步</button><span class="tiny">${hasGraph?'图谱已就绪，可进入下一步编辑':'完成生成后可进入下一阶段'}</span><button class="btn primary" ${hasGraph?'':'disabled'} onclick="navTo('chat')">下一步 →</button>`})}
function generationHtml(){return `<div style="text-align:center;padding:18px"><div class="loading-ring"></div><h3>AI 正在生成本体知识图谱</h3><p class="muted">根据业务流程文档抽取结构化知识</p><div class="gen-steps">${['分析业务流程文档…','识别实体与关系…','构建节点连接…','优化布局与入口…','校验图谱完整性…'].map((s,i)=>`<div class="gen-step ${i<state.genStep?'done':i===state.genStep?'on':''}"><span class="dot">${i<state.genStep?'✓':'•'}</span>${s}</div>`).join('')}</div></div>`}
function summaryHtml(g){return `<div><div class="toolbar"><span class="icon-box green">✓</span><div><strong>图谱生成成功</strong><p class="muted" style="margin:3px 0 0">${g.name}</p></div></div><div class="stats" style="margin-top:14px;grid-template-columns:repeat(3,1fr)"><div class="stat"><strong>${g.nodes.length}</strong><span>节点</span></div><div class="stat"><strong style="color:#10b981">${g.edges.length}</strong><span>关系边</span></div><div class="stat"><strong style="color:#f59e0b">${g.entryNodeIds.length}</strong><span>入口节点</span></div></div><div class="divider"></div><div class="chips">${[...new Set(g.nodes.map(n=>n.kind))].map(k=>`<span class="chip indigo">${k}</span>`).join('')}</div></div>`}
function wireGenerate(){const btn=$('#generateBtn'); if(btn) btn.onclick=()=>startGenerate(); const edit=$('#editBack'); if(edit) edit.onclick=()=>navTo('import')}
function startGenerate(){state.generating=true; state.genStep=0; save(); render(); let i=0; const timer=setInterval(()=>{i++; state.genStep=i; save(); if(i>=5){clearInterval(timer); state.graph=demoGraph(); state.generating=false; state.versions=[]; save(); toast('图谱生成成功'); render()} else render();},650)}
function renderChat(){const g=state.graph; return `<section class="stage chat-layout"><header class="topbar"><div class="top-inner"><nav class="crumb"><span>工作区</span><span>/</span><span>业务知识工坊</span><span>/</span><b>对话编辑</b></nav><div class="title-row"><div class="title"><h1>自然语言编辑</h1><p>通过对话修改诊断图谱 · 支持连续多轮编辑 · 每一步都可撤销</p></div>${progress(3)}</div></div></header><div class="chat-main">
  <aside class="chat-panel"><div class="panel-head">✦ 整图对话 · 经验合并 <span class="badge" style="margin-left:auto;padding:3px 8px">多轮</span></div><div class="messages" id="editMessages">${renderEditMessages()}</div><div class="composer"><input class="input" id="editInput" placeholder="对整张图下达修改指令，支持连续多轮对话…"><button class="btn primary" id="sendEdit">➤</button></div></aside>
  <section class="canvas">${g?graphCanvas(g):`<div class="empty-center"><div class="empty-card"><div style="font-size:42px">🤖</div><h3>暂无本体图谱</h3><p>请先在「生成本体」阶段创建图谱。</p><button class="btn primary" onclick="navTo('generate')">← 返回生成</button></div></div>`}</section>
  </div><nav class="bottom-nav"><div class="bottom-inner"><div><span class="badge">阶段 3/5</span> <span class="tiny">精调优化</span></div><div class="toolbar"><button class="btn" onclick="navTo('generate')">‹ 上一阶段</button><button class="btn primary" ${g?'':'disabled'} onclick="navTo('review')">完成编辑 ✓</button></div></div></nav></section>`}
function renderEditMessages(){const msgs=state.editMessages||[{role:'ai',text:'我可以帮你用自然语言改图谱。例如：添加「冰柜温度检查」节点，连接到 D-S-P-M 单店诊断。'}]; return msgs.map(m=>`<div class="bubble ${m.role==='user'?'user':'ai'}">${escapeHtml(m.text)}</div>`).join('')}
function graphCanvas(g, mini=false){const scale=mini?.28:1; const w=mini?200:1000, h=mini?130:520; const nodes=g.nodes; const by=Object.fromEntries(nodes.map(n=>[n.id,n])); const edgeSvg=g.edges.map(([a,b])=>{const s=by[a],t=by[b]; return s&&t?`<line class="edge" x1="${s.x}" y1="${s.y}" x2="${t.x}" y2="${t.y}"/>`:''}).join(''); const nodeSvg=nodes.map(n=>`<g class="node ${state.selectedNode===n.id?'active':''}" data-node="${n.id}"><rect x="${n.x-68}" y="${n.y-26}" width="136" height="52" rx="14" fill="white" stroke="${n.color}"/><circle cx="${n.x-48}" cy="${n.y}" r="9" fill="${n.color}"/><text class="node-label" x="${n.x-30}" y="${n.y+4}">${escapeHtml(n.label)}</text></g>`).join(''); return `<div class="canvas-toolbar"><button class="btn ghost" id="undoBtn">↶</button><button class="btn ghost" id="redoBtn">↷</button><button class="btn ghost" id="autoLayout">▦ 自动排版</button><button class="btn ghost" id="addNode">＋ 添加节点</button><button class="btn ghost" id="fitView">⛶</button></div><svg class="graph-svg" viewBox="0 0 ${w} ${h}"><defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="10" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#94a3b8"/></marker></defs>${edgeSvg}${nodeSvg}</svg><div class="legend">ⓘ 图例 · 节点可点击</div><div class="mini">${miniMap(g)}</div><div class="side-info ${state.selectedNode?'show':''}">${nodeInfo(g)}</div>`}
function miniMap(g){return `<strong class="tiny">诊断图谱缩略图</strong><svg width="200" height="118" viewBox="0 0 850 360">${g.edges.map(([a,b])=>{const s=g.nodes.find(n=>n.id===a),t=g.nodes.find(n=>n.id===b);return `<line x1="${s.x}" y1="${s.y}" x2="${t.x}" y2="${t.y}" stroke="#cbd5e1" stroke-width="3"/>`}).join('')}${g.nodes.map(n=>`<circle cx="${n.x}" cy="${n.y}" r="18" fill="${n.color}" opacity="${state.activeDiag===n.id?1:.65}"/>`).join('')}</svg>`}
function nodeInfo(g){const n=g.nodes.find(x=>x.id===state.selectedNode); if(!n)return ''; return `<div class="toolbar"><span class="icon-box" style="color:${n.color};background:${n.color}20">●</span><div><strong>${escapeHtml(n.label)}</strong><p class="tiny" style="margin:2px 0 0">${escapeHtml(n.kind)}</p></div></div><p class="muted">${escapeHtml(n.desc||'节点说明')}</p><button class="btn danger" id="deleteNode">删除节点</button>`}
function wireChat(){if(!state.graph)return; $$('.node').forEach(el=>el.onclick=()=>{state.selectedNode=el.dataset.node; save(); render()}); const send=$('#sendEdit'), input=$('#editInput'); if(send) send.onclick=()=>sendEdit(); if(input) input.onkeydown=e=>{if(e.key==='Enter')sendEdit()}; $('#addNode')?.addEventListener('click',()=>addGraphNode('冰柜温度检查')); $('#autoLayout')?.addEventListener('click',()=>{autoLayout();toast('已自动排版')}); $('#deleteNode')?.addEventListener('click',deleteSelectedNode); $('#fitView')?.addEventListener('click',()=>toast('已适配画布视图（静态模拟）'));}
function sendEdit(){const input=$('#editInput'); const text=input.value.trim(); if(!text)return; state.editMessages=state.editMessages||[]; state.editMessages.push({role:'user',text}); input.value=''; if(/添加|新增|加一个|冰柜|温度/.test(text)){addGraphNode(/冰柜|温度/.test(text)?'冰柜温度检查':'新增业务节点', false); state.editMessages.push({role:'ai',text:'已根据指令新增节点，并连接到当前诊断链路。你可以继续要求我改名、删除或调整关系。'});} else if(/删除/.test(text)&&state.selectedNode){deleteSelectedNode(false); state.editMessages.push({role:'ai',text:'已删除选中的节点，并清理相关连线。'});} else {state.editMessages.push({role:'ai',text:'已理解你的修改意图。静态稿中可演示添加节点、点击节点、删除节点和自动排版。'});} save(); render();}
function addGraphNode(label, rerender=true){if(!state.graph) return; const id='node_'+Math.random().toString(36).slice(2,7); state.graph.nodes.push({id,label,kind:'专家经验',x:560+Math.random()*120,y:320+Math.random()*80,color:'#8b5cf6',desc:'由自然语言编辑新增的专家经验节点。'}); state.graph.edges.push(['dspm',id],[id,'report']); state.selectedNode=id; save(); if(rerender) render();}
function deleteSelectedNode(rerender=true){const id=state.selectedNode;if(!id||!state.graph)return; state.graph.nodes=state.graph.nodes.filter(n=>n.id!==id); state.graph.edges=state.graph.edges.filter(e=>!e.includes(id)); state.selectedNode=null; save(); if(rerender)render();}
function autoLayout(){if(!state.graph)return; const pos=[[120,180],[320,105],[530,165],[330,300],[760,235],[575,330],[720,110]]; state.graph.nodes.forEach((n,i)=>{n.x=pos[i%pos.length][0];n.y=pos[i%pos.length][1]}); save(); render();}
function renderReview(){const g=state.graph; if(!g) return layout({crumb:'工作区 / 业务知识工坊 / 审核',title:'审核与导出',desc:'请先生成诊断图谱后再来审核。',phase:4,content:`<div class="empty-center"><div class="empty-card"><h2>暂无图谱数据</h2><p>请先在「准备输入」阶段导入业务流程文档，生成诊断图谱后再来审核。</p><button class="btn primary" onclick="navTo('import')">前往构建</button></div></div>`}); const kind=[...new Set(g.nodes.map(n=>n.kind))]; return layout({crumb:'工作区 / 业务知识工坊 / 审核',title:'审核与导出',desc:'终审图谱、提交版本、导出归档，链接至小赢前线单聊。',phase:4,badge:`<button class="btn green" onclick="navTo('xiaoying')">前线单聊 · 小赢 ↗</button>`,content:`
  <div class="review-grid"><div class="grid">
    <section class="card"><div class="card-head"><div class="card-title"><span class="icon-box">✦</span><div><h3>图谱总览</h3><p>${g.name} · v${g.version}</p></div></div></div><div class="card-body"><div class="stats"><div class="stat"><strong>${g.nodes.length}</strong><span>节点</span></div><div class="stat"><strong style="color:#10b981">${g.edges.length}</strong><span>连线</span></div><div class="stat"><strong style="color:#f59e0b">${g.entryNodeIds.length}</strong><span>入口</span></div><div class="stat"><strong style="color:#8b5cf6">4</strong><span>层级</span></div></div><div class="divider"></div><div class="chips">${kind.map(k=>`<span class="chip indigo">${k}</span>`).join('')}</div><p class="tiny">最后更新：${new Date(g.updatedAt).toLocaleString()}</p></div></section>
    <section class="card"><div class="card-head"><div class="card-title"><span class="icon-box">⬆</span><div><h3>导入图谱</h3><p>支持本地 JSON 覆盖当前静态图谱</p></div></div></div><div class="card-body"><div class="upload-zone"><input type="file" id="uploadGraph" accept="application/json"><p class="tiny">选择 JSON 文件后立即载入。</p></div></div></section>
    <section class="card"><div class="card-head"><div class="card-title"><span class="icon-box green">⬇</span><div><h3>导出 / 分享</h3><p>本地静态下载，不连接后端。</p></div></div></div><div class="card-body grid"><button class="btn" id="exportJson">导出 JSON</button><button class="btn" id="exportYaml">导出 YAML</button><button class="btn" id="copyJson">复制 JSON</button></div></section>
  </div><div class="grid">
    <section class="card"><div class="card-head"><div class="card-title"><span class="icon-box green">↻</span><div><h3>版本历史</h3><p>提交当前图以备回溯</p></div></div><button class="btn primary" id="commitGraph">提交当前图</button></div><div class="card-body" id="versions">${renderVersions()}</div></section>
    <section class="card" style="background:linear-gradient(135deg,#ecfdf5,#fff)"><div class="card-head"><div class="card-title"><span class="icon-box green">💬</span><div><h3>前线验证</h3><p>把审核后的图谱交给小赢做诊断验证。</p></div></div></div><div class="card-body"><p class="muted">小赢会基于当前图谱驱动业务诊断，验证图谱质量与完整度。</p><button class="btn green" onclick="navTo('xiaoying')">去小赢验证 ↗</button></div></section>
  </div></div>
`,bottom:`<button class="btn" onclick="navTo('chat')">← 返回编辑</button><span class="tiny">阶段 4 / 5 · 审核</span><button class="btn primary" onclick="navTo('xiaoying')">去前线验证 →</button>`})}
function renderVersions(){const arr=state.versions||[]; if(!arr.length)return '<p class="muted">暂无提交。点击「提交当前图」创建版本快照。</p>'; return arr.map(v=>`<div class="version-row"><span class="icon-box green">✓</span><div><strong>${escapeHtml(v.title)}</strong><p class="tiny">${new Date(v.time).toLocaleString()} · ${v.nodes} 节点 / ${v.edges} 连线</p></div></div>`).join('')}
function wireReview(){if(!state.graph)return; $('#commitGraph')?.addEventListener('click',()=>{state.versions=state.versions||[]; state.versions.unshift({title:'提交本体图 v'+(state.versions.length+1),time:Date.now(),nodes:state.graph.nodes.length,edges:state.graph.edges.length}); save(); render(); toast('已提交版本快照')}); $('#exportJson')?.addEventListener('click',()=>download('ontology.json', JSON.stringify(state.graph,null,2),'application/json')); $('#exportYaml')?.addEventListener('click',()=>download('ontology.yaml', toYaml(state.graph),'text/yaml')); $('#copyJson')?.addEventListener('click',()=>navigator.clipboard?.writeText(JSON.stringify(state.graph,null,2)).then(()=>toast('已复制 JSON')).catch(()=>toast('复制失败，可改用导出'))); $('#uploadGraph')?.addEventListener('change',e=>{const f=e.target.files[0]; if(!f)return; f.text().then(t=>{try{state.graph=JSON.parse(t);save();render();toast('图谱已导入')}catch{toast('JSON 格式不正确')}})})}
function download(name, content, type){const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([content],{type})); a.download=name; a.click(); URL.revokeObjectURL(a.href); toast('已开始下载 '+name)}
function toYaml(obj,indent=0){const pad='  '.repeat(indent); if(obj==null)return 'null'; if(typeof obj!=='object')return JSON.stringify(obj); if(Array.isArray(obj))return obj.map(v=>pad+'- '+toYaml(v,indent+1).trimStart()).join('\n'); return Object.entries(obj).map(([k,v])=>pad+k+': '+(typeof v==='object'&&v?('\n'+toYaml(v,indent+1)):toYaml(v,indent+1))).join('\n')}
function renderXiaoying(){const msgs=state.frontMessages||[]; return `<section class="stage frontline"><header class="topbar"><div class="top-inner"><div class="title-row"><div><nav class="crumb"><span>工作区</span><span>/</span><b>小赢</b></nav><div class="title"><h1>小赢 · 业务诊断</h1><p>输入业务问题，AI 小赢为您智能诊断业务数据。</p></div></div><div class="toolbar"><span class="badge">前线诊断</span><button class="btn" onclick="navTo('import')">专家工作台</button></div></div></div></header><div class="front-main"><section class="front-chat"><div class="messages" id="frontMessages">${msgs.length?renderFrontMessages(msgs):frontEmpty()}</div><div class="composer"><input class="input" id="frontInput" placeholder="问问小赢——比如「哪个经销商销售额掉得最厉害？」"><button class="btn green" id="sendFront">发送</button></div></section><aside class="right-rail"><div class="toolbar"><span class="icon-box green">✦</span><strong>诊断进度</strong></div><div class="mini" style="position:static;width:100%;height:auto;margin-top:12px">${state.graph?miniMap(state.graph):'<p class="tiny">暂无图谱</p>'}</div><p class="tiny">诊断进行中时，小赢正在查证的业务维度会在此实时点亮。</p><ul class="progress-list">${['全范围筛查','趋势判断','经销商归因','D-S-P-M 单店诊断','生成报告'].map((x,i)=>`<li class="${state.diagStep===i?'on':''}">● ${x}</li>`).join('')}</ul></aside></div></section>`}
function frontEmpty(){return `<div class="front-empty"><div style="font-size:52px">🤖</div><div><strong>输入业务问题，开始智能诊断</strong><p class="muted">小赢将基于业务本体图谱，为您追溯数据链路、诊断业务问题。</p></div><div class="suggestions"><button class="btn" onclick="askFront('最近一个月哪个经销商销售额下滑最明显？')">哪个经销商销售额下滑最明显？</button><button class="btn" onclick="askFront('帮我检查一下饮料品类的库存周转情况')">检查饮料品类库存周转</button><button class="btn" onclick="askFront('哪些门店冰柜陈列温度不达标？')">哪些门店冰柜温度不达标？</button></div></div>`}
function renderFrontMessages(msgs){return msgs.map(m=>m.type==='evidence'?`<div class="evidence"><strong>${m.title}</strong><p class="muted">${m.text}</p><div class="stats" style="grid-template-columns:repeat(3,1fr)"><div class="stat"><strong>23</strong><span>门店</span></div><div class="stat"><strong style="color:#f59e0b">-8.6%</strong><span>IYA</span></div><div class="stat"><strong style="color:#10b981">4</strong><span>原因</span></div></div></div>`:`<div class="bubble ${m.role==='user'?'user':'ai'}">${escapeHtml(m.text)}</div>`).join('')}
window.askFront=(q)=>{state.frontMessages=state.frontMessages||[]; state.frontMessages.push({role:'user',text:q}); state.frontMessages.push({role:'ai',text:'收到。我会先按图谱进行全范围筛查，再下钻到经销商与单店执行维度。'}); state.diagStep=0; save(); render(); simulateDiagnosis();}
function wireXiaoying(){const send=$('#sendFront'), input=$('#frontInput'); if(send)send.onclick=()=>{const q=input.value.trim(); if(q)askFront(q)}; if(input)input.onkeydown=e=>{if(e.key==='Enter'&&input.value.trim())askFront(input.value.trim())}}
function simulateDiagnosis(){let i=0; const ids=['start','trend','dealer','dspm','report']; const timer=setInterval(()=>{state.diagStep=i; state.activeDiag=ids[i]; if(i===2){state.frontMessages.push({type:'evidence',title:'证据卡 · 经销商下滑筛查',text:'RD 华北 / 饮料品类出现连续 4 周下滑，主要集中在 Top 23 门店。'});} if(i===4){state.frontMessages.push({role:'ai',text:'诊断结论：下滑主要来自经销商个体执行问题，优先核查 D-S-P-M 中的货架与助销执行；建议先处理 Top 23 门店。'});} save(); render(); i++; if(i>4)clearInterval(timer);},780)}
function renderPlaceholder(key){const titles={newchat:'新建对话',chats:'历史对话',config:'配置中心',assets:'资产管理',analytics:'用量统计',graph:'知识图谱',dispatch:'调度中心',messages:'消息中心',help:'帮助中心'}; const title=titles[key]||'工作区'; let body=''; if(key==='newchat') body=`<div class="hero"><h2>专家对话台</h2><p class="muted">复刻项目的白色玻璃卡片、渐变品牌与底部 composer。</p><div class="composer" style="border:0;padding:0;margin-top:22px"><input class="input" placeholder="询问 WinBrain…"><button class="btn primary">发送</button></div></div>`; else if(key==='chats') body=`<div class="hero"><h2>对话资产表</h2><table class="table"><tr><th>标题</th><th>标签</th><th>状态</th><th>更新时间</th></tr>${['FMCG 诊断复盘','图谱构建讨论','模型配置检查'].map((x,i)=>`<tr><td>${x}</td><td><span class="chip indigo">业务</span></td><td>已归档</td><td>${i+1} 小时前</td></tr>`).join('')}</table></div>`; else if(key==='config') body=`<div class="grid two"><div class="card"><div class="card-head"><div class="card-title"><span class="icon-box">🧠</span><div><h3>模型管理</h3><p>供应商、状态切换、密钥遮罩。</p></div></div></div><div class="card-body"><div class="chips"><span class="chip green">MiniMax M3 · 启用</span><span class="chip">OpenAI Codex · 待配置</span></div></div></div><div class="card"><div class="card-head"><div class="card-title"><span class="icon-box green">🛢️</span><div><h3>数据源管理</h3><p>连接串体检与权限隔离。</p></div></div></div><div class="card-body"><button class="btn primary">新增数据源</button></div></div></div>`; else if(key==='analytics') body=`<div class="grid two"><div class="card"><div class="card-head"><div class="card-title"><span class="icon-box">📊</span><div><h3>Token 用量</h3><p>静态柱状图演示。</p></div></div></div><div class="card-body"><div class="bars">${[40,88,52,120,76,144,92].map(h=>`<div class="bar" style="height:${h}px"></div>`).join('')}</div></div></div><div class="card"><div class="card-head"><div class="card-title"><span class="icon-box green">✓</span><div><h3>成功率</h3><p>本周 98.4%</p></div></div></div><div class="card-body"><div class="stats"><div class="stat"><strong>1.2k</strong><span>调用</span></div><div class="stat"><strong style="color:#10b981">98%</strong><span>成功</span></div></div></div></div></div>`; else if(key==='dispatch') body=`<div class="kanban"><div class="kanban-col"><strong>待调度</strong><div class="task">图谱补全</div><div class="task">数据体检</div></div><div class="kanban-col"><strong>运行中</strong><div class="task">小赢诊断回放</div></div><div class="kanban-col"><strong>已完成</strong><div class="task">版本提交</div></div></div>`; else body=`<div class="hero"><h2>${title}</h2><p class="muted">此页为静态交互稿中的设计占位：保留项目统一的侧边栏、玻璃卡片、渐变按钮、表格和状态徽章风格。</p><div class="chips"><span class="chip indigo">Shadcn 风格</span><span class="chip green">WinBrain 品牌色</span><span class="chip">本地静态</span></div></div>`; return layout({crumb:`工作区 / ${title}`,title,desc:'静态复制项目工作区视觉与常用交互。',content:`<div class="placeholder-page">${body}</div>`})}
function escapeHtml(s=''){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function render(){renderNav(); const main=$('#main'); const p=state.page; if(p==='import') main.innerHTML=renderImport(); else if(p==='generate') main.innerHTML=renderGenerate(); else if(p==='chat') main.innerHTML=renderChat(); else if(p==='review') main.innerHTML=renderReview(); else if(p==='xiaoying') main.innerHTML=renderXiaoying(); else main.innerHTML=renderPlaceholder(p); wire(); $$('.nav-item').forEach(b=>{if(b.dataset.page)b.classList.toggle('active',isActive(b.dataset.page))});}
function wire(){wireImport(); wireGenerate(); wireChat(); wireReview(); wireXiaoying();}
$('#collapseBtn').onclick=()=>$('#sidebar').classList.toggle('collapsed'); $('#settingsBtn').onclick=()=>$('#settingsModal').classList.add('show'); $$('[data-close-modal]').forEach(b=>b.onclick=()=>$('#settingsModal').classList.remove('show')); $('#settingsModal').onclick=e=>{if(e.target.id==='settingsModal')e.currentTarget.classList.remove('show')}; $('#botBtn').onclick=()=>navTo('xiaoying');
render();
</script>
