<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WinBrain - AI 专家工作台</title>
  <link rel="stylesheet" href="styles/main.css">
</head>
<body>
  <div id="app" class="shell" role="application">
    <!-- 侧边栏 -->
    <aside id="sidebar" class="sidebar" aria-label="主导航">
      <div class="brand">
        <img src="assets/logo.svg" alt="WinBrain Logo" />
        <div class="brand-title">WinBrain</div>
        <button class="collapse-btn" id="collapseBtn" aria-label="折叠侧边栏" aria-expanded="true">
          ⌜
        </button>
      </div>

      <nav class="nav" role="navigation">
        <ul class="nav-section" id="navList">
          <!-- 导航项由 JavaScript 动态生成 -->
        </ul>
      </nav>

      <div class="footer">
        <button class="nav-item" data-page="help" aria-label="帮助中心">
          <span style="font-size: 20px;">?</span>
          <span>帮助中心</span>
        </button>
        <button class="nav-item" id="settingsBtn" aria-label="设置">
          <span style="font-size: 20px;">⚙</span>
          <span>设置</span>
        </button>
      </div>
    </aside>

    <!-- 主内容区 -->
    <main id="main" class="main" role="main">
      <!-- 内容由 JavaScript 动态渲染 -->
    </main>
  </div>

  <!-- 设置模态框 -->
  <div id="settingsModal" class="modal-backdrop" role="dialog" aria-hidden="true">
    <div class="modal">
      <div class="modal-head">
        <strong>设置与偏好</strong>
        <button class="btn ghost" data-close-modal aria-label="关闭">关闭</button>
      </div>
      <div class="modal-body">
        <div class="card">
          <div class="card-head">
            <div class="card-title">
              <span class="icon-box">🎨</span>
              <div>
                <h3>外观设置</h3>
                <p>自定义界面显示偏好</p>
              </div>
            </div>
          </div>
          <div class="card-body">
            <label class="flex items-center gap-2">
              <input type="checkbox" id="compactToggle">
              <span>紧凑模式</span>
            </label>
          </div>
        </div>

        <div class="card mt-4">
          <div class="card-head">
            <div class="card-title">
              <span class="icon-box green">💾</span>
              <div>
                <h3>数据管理</h3>
                <p>重置或导出应用数据</p>
              </div>
            </div>
          </div>
          <div class="card-body">
            <button class="btn ghost" onclick="app.resetDemo()">重置演示数据</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="scripts/app.js"></script>
</body>
</html>
